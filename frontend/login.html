<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Login - Neolife Wellness Center</title>
  <link rel="icon" type="image/jpeg" href="../assets/prod_logo.png">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Segoe UI", Arial, sans-serif;
    }

    body{
      min-height:100vh;
       background: linear-gradient(rgba(15,61,29,0.70), rgba(15,61,29,0.70));
      background-size:cover;
      background-position:center;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .login-card{
      width:100%;
      max-width:460px;
      background:rgba(255,255,255,0.16);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.28);
      border-radius:32px;
      padding:42px;
      position:relative;
      overflow:hidden;
      box-shadow:0 20px 50px rgba(0,0,0,0.35);
      animation:fadeUp 0.8s ease;
    }

    .login-card::before{
      content:"";
      position:absolute;
      width:300px;
      height:300px;
      background:rgba(255,215,106,0.14);
      border-radius:50%;
      top:-130px;
      right:-130px;
    }

    .login-card::after{
      content:"";
      position:absolute;
      width:220px;
      height:220px;
      background:rgba(255,255,255,0.08);
      border-radius:50%;
      bottom:-100px;
      left:-100px;
    }

    .login-content{
      position:relative;
      z-index:2;
    }

    .auth-logo{
      width:95px;
      height:95px;
      object-fit:cover;
      border-radius:50%;
      border:4px solid #ffd76a;
      background:white;
      display:block;
      margin:0 auto 18px;
      box-shadow:0 8px 25px rgba(0,0,0,0.25);
    }

    .login-card h2{
      color:white;
      text-align:center;
      font-size:34px;
      margin-bottom:8px;
      letter-spacing:0.5px;
    }

    .login-card p{
      color:#f2f2f2;
      text-align:center;
      font-size:15px;
      margin-bottom:24px;
    }

    .social-title{
      color:#fff;
      font-size:14px;
      margin-bottom:12px;
      font-weight:600;
    }

    .social-buttons{
      display:flex;
      gap:12px;
      margin-bottom:22px;
    }

    .social-btn{
      flex:1;
      height:46px;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,0.92);
      cursor:pointer;
      font-weight:700;
      color:#333;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:0.3s;
    }

    .social-btn:hover{
      transform:translateY(-4px);
      box-shadow:0 12px 22px rgba(0,0,0,0.18);
    }

    .social-btn span{
      font-size:19px;
      font-weight:900;
    }

    .google span{
      color:#db4437;
    }

    .facebook span{
      color:#1877f2;
    }

    .divider{
      text-align:center;
      color:#f4f4f4;
      font-size:13px;
      margin:22px 0;
      position:relative;
    }

    .divider::before,
    .divider::after{
      content:"";
      position:absolute;
      top:50%;
      width:42%;
      height:1px;
      background:rgba(255,255,255,0.35);
    }

    .divider::before{
      left:0;
    }

    .divider::after{
      right:0;
    }

    .tabs{
      display:flex;
      background:rgba(255,255,255,0.18);
      border-radius:14px;
      padding:5px;
      margin-bottom:18px;
    }

    .tab-btn{
      flex:1;
      border:none;
      padding:11px;
      border-radius:11px;
      background:transparent;
      color:white;
      font-weight:800;
      cursor:pointer;
      transition:0.3s;
    }

    .tab-btn.active{
      background:linear-gradient(135deg,#ffd76a,#d4a017);
      color:#1b5e20;
      box-shadow:0 6px 16px rgba(212,160,23,0.35);
    }

    .form-group{
      margin-bottom:15px;
    }

    .form-group input{
      width:100%;
      height:52px;
      border:none;
      border-radius:16px;
      background:rgba(255,255,255,0.92);
      padding:0 18px;
      font-size:15px;
      outline:none;
      color:#1f2937;
    }

    .form-group input:focus{
      box-shadow:0 0 0 3px rgba(255,215,106,0.38);
      background:white;
    }

    .login-options{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:22px;
      font-size:13px;
      color:#f5f5f5;
    }

    .login-options a{
      color:#ffd76a;
      text-decoration:none;
      font-weight:700;
    }

    .login-btn{
      width:100%;
      height:52px;
      border:none;
      border-radius:50px;
      background:linear-gradient(135deg,#ffd76a,#d4a017);
      color:#1b5e20;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 8px 22px rgba(212,160,23,0.38);
    }

    .login-btn:hover{
      transform:translateY(-4px);
      box-shadow:0 15px 30px rgba(212,160,23,0.48);
    }

    .otp-btn{
      background:linear-gradient(135deg,#1b5e20,#2e7d32);
      color:white;
      margin-top:10px;
      box-shadow:0 8px 22px rgba(27,94,32,0.35);
    }

    .otp-btn:hover{
      box-shadow:0 15px 30px rgba(27,94,32,0.45);
    }

    .signup{
      text-align:center;
      margin-top:22px;
      font-size:14px;
      color:white;
    }

    .signup a{
      color:#ffd76a;
      font-weight:800;
      text-decoration:none;
    }

    .hide{
      display:none;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(35px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:480px){
      .login-card{
        padding:32px 24px;
        border-radius:26px;
      }

      .login-card h2{
        font-size:28px;
      }

      .social-buttons{
        flex-direction:column;
      }
    }
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

</head>

<body>

<div class="login-card">
  <div class="login-content">

    <img src="../assets/prod_logo.png" class="auth-logo" alt="Neolife Logo">

    <h2>Patient Login</h2>
    <p>Welcome back! Login to book your consultation</p>

    <div class="social-title">Continue with:</div>

    <div class="social-buttons">
  <button class="social-btn google" onclick="startGoogleLogin()">
  <span>G</span> Google
</button>
</div>

    <div class="divider">or</div>

    <div class="tabs">
      <button class="tab-btn active" id="emailTab" onclick="showEmailLogin()">
        Email Login
      </button>

      <button class="tab-btn" id="phoneTab" onclick="showPhoneLogin()">
        Phone OTP
      </button>
    </div>

    <form id="emailLoginForm" onsubmit="return emailLogin(event)">

      <div class="form-group">
        <input type="email" id="email" placeholder="Email Address">
      </div>

      <div class="form-group">
        <input type="password" id="password" placeholder="Password">
      </div>

      <div class="login-options">
        <label>
          <input type="checkbox"> Remember
        </label>

        <a href="forgot-password.html">Forgot Password?</a>
      </div>

      <button type="submit" class="login-btn">
        Login
      </button>

    </form>

    <form id="phoneLoginForm" class="hide" onsubmit="return verifyOTP()">

      <div class="form-group">
        <input 
          type="tel" 
          id="phone" 
          placeholder="Enter Phone Number"
          maxlength="10"
          oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      </div>

      <button type="button" class="login-btn otp-btn" onclick="sendOTP()">
        Send OTP
      </button>

      <div class="form-group" style="margin-top:15px;">
        <input 
          type="text" 
          id="otp" 
          placeholder="Enter OTP"
          maxlength="6"
          oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      </div>

      <button type="submit" class="login-btn">
        Verify OTP & Login
      </button>

    </form>

    <div class="signup">
      New patient? <a href="register.html">Create account</a>
    </div>

  </div>
</div>

<script>
const API_BASE_URL = "http://localhost:8085";

function showEmailLogin(){
  document.getElementById("emailLoginForm").classList.remove("hide");
  document.getElementById("phoneLoginForm").classList.add("hide");
  document.getElementById("emailTab").classList.add("active");
  document.getElementById("phoneTab").classList.remove("active");
}

function showPhoneLogin(){
  document.getElementById("phoneLoginForm").classList.remove("hide");
  document.getElementById("emailLoginForm").classList.add("hide");
  document.getElementById("phoneTab").classList.add("active");
  document.getElementById("emailTab").classList.remove("active");
}

async function emailLogin(event){
    event.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if(email === "" || password === ""){
        alert("Please enter email and password");
        return false;
    }

    try{

        // Step 1: Login
        const loginResponse = await fetch(`${API_BASE_URL}/api/auth/login`,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                email:email,
                password:password
            })
        });

        const loginResult = await loginResponse.json();

        if(!loginResult.success){
            alert(loginResult.message || "Invalid Email or Password");
            return false;
        }

        // Step 2: Save login details
        const token = loginResult.data.token;

        localStorage.setItem("token", token);
        localStorage.setItem("refreshToken", loginResult.data.refreshToken);
        localStorage.setItem("userId", loginResult.data.id);
        localStorage.setItem("email", loginResult.data.email);
        localStorage.setItem("isLoggedIn","true");

        // Step 3: Try User Profile API
let profileResponse = await fetch(`${API_BASE_URL}/api/users/getProfile`, {
    method: "GET",
    headers: {
        "Authorization": "Bearer " + token
    }
});

let profileResult = await profileResponse.json();

// If user API says only users can access, try Admin API
if (!profileResult.success && profileResult.message === "Only users can access this API") {

    profileResponse = await fetch(`${API_BASE_URL}/api/admin/getAdminProfile`, {
        method: "GET",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    profileResult = await profileResponse.json();
}

if (!profileResult.success) {
    alert(profileResult.message || "Unable to fetch profile");
    return false;
}

// Save profile details
localStorage.setItem("name", profileResult.data.name);
localStorage.setItem("phoneNumber", profileResult.data.phoneNumber);
localStorage.setItem("age", profileResult.data.age);
localStorage.setItem("gender", profileResult.data.gender);
localStorage.setItem("role", profileResult.data.role);

// Redirect
if (profileResult.data.role === "ADMIN") {
    alert("Welcome Admin");
    window.location.href = "../admin/admin-dashboard.html";
} else {
    alert("Welcome " + profileResult.data.name);
    window.location.href = "profile.html";
}
    }catch(error){
        console.log(error);
        alert("Unable to connect to backend.");
    }

    return false;
}

async function sendOTP(){
  alert("Phone OTP API is not available now. Use Email Login.");
}

async function verifyOTP(){
  alert("Phone OTP API is not available now. Use Email Login.");
  return false;
}

let googleReady = false;

window.onload = function(){
  initGoogleLogin();
};

function initGoogleLogin(){
  google.accounts.id.initialize({
    client_id: "277109720887-bd1pfueg8eodgbm76qh18kn8rc22quvl.apps.googleusercontent.com",
    callback: handleGoogleResponse,
    use_fedcm_for_prompt: false
  });

  googleReady = true;
}

function startGoogleLogin(){
  if(!googleReady){
    alert("Google login is loading. Try again.");
    return;
  }

  google.accounts.id.prompt();
}

async function handleGoogleResponse(response){
  const res = await fetch(`${API_BASE_URL}/api/auth/google-login`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      idToken: response.credential
    })
  });

  const result = await res.json();

  if(result.success){
    localStorage.setItem("token", result.data.token);
    localStorage.setItem("refreshToken", result.data.refreshToken);
    localStorage.setItem("userId", result.data.id);
    localStorage.setItem("email", result.data.email);
    localStorage.setItem("isLoggedIn", "true");

    alert("Google login successful");
    window.location.href = "profile.html";
  }else{
    alert(result.message || "Google login failed");
  }
}


</script>

</body>
</html>
