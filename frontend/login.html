<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Patient Login - Neolife Wellness Center</title>

  <link rel="icon" type="image/jpeg" href="../assets/main_logo.jpeg">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    :root{
      --green-950:#0d281b;
      --green-900:#123524;
      --green-700:#2f6b3f;
      --green-500:#5c8b61;
      --sage:#dfeadd;
      --cream:#f8f4e8;
      --gold:#d4af37;
      --gold-dark:#9a7100;
      --white:#ffffff;
      --text:#203329;
      --muted:#6d7971;
      --shadow:0 26px 70px rgba(13,40,27,.28);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:"Segoe UI", Arial, sans-serif;
    }

    body{
      min-height:100vh;
      color:var(--text);
      background:
        linear-gradient(rgba(13,40,27,.64),rgba(13,40,27,.68)),
        url("../assets/neolife2.png") center/cover no-repeat fixed;
      position:relative;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 20% 18%,rgba(212,175,55,.18),transparent 28%),
        radial-gradient(circle at 82% 74%,rgba(255,255,255,.10),transparent 30%);
      pointer-events:none;
    }

    /* Top navigation */
    .login-header{
      position:fixed;
      top:0;
      left:0;
      right:0;
      height:82px;
      padding:0 6%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:30px;
      z-index:1000;
      background:rgba(13,40,27,.44);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.12);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      color:white;
      text-decoration:none;
      flex-shrink:0;
    }

    .brand img{
      width:52px;
      height:52px;
      object-fit:cover;
      border-radius:50%;
      border:2px solid var(--gold);
    }

    .brand strong{
      display:block;
      font-size:18px;
      line-height:1.1;
    }

    .brand span{
      display:block;
      margin-top:4px;
      color:#f1d878;
      font-size:11px;
      font-weight:800;
      letter-spacing:1.2px;
      text-transform:uppercase;
    }

    .login-nav{
      display:flex;
      align-items:center;
      gap:28px;
    }

    .login-nav a{
      color:white;
      text-decoration:none;
      font-size:14px;
      font-weight:800;
    }

    .login-nav a:hover{
      color:#f1d878;
    }

    .nav-login{
      padding:10px 20px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.75);
    }

    /* Page layout */
    .login-page{
      min-height:100vh;
      padding:122px 20px 40px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .login-shell{
      width:min(470px,100%);
      position:relative;
    }

    .login-card{
      width:100%;
      padding:38px 38px 34px;
      border-radius:26px;
      background:rgba(248,244,232,.82);
      backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,.62);
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .login-card::before{
      content:"";
      position:absolute;
      width:220px;
      height:220px;
      right:-90px;
      top:-90px;
      border-radius:50%;
      background:rgba(212,175,55,.13);
    }

    .login-card::after{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      left:-85px;
      bottom:-90px;
      border-radius:50%;
      background:rgba(47,107,63,.10);
    }

    .close-button{
      position:absolute;
      top:16px;
      right:16px;
      width:36px;
      height:36px;
      display:grid;
      place-items:center;
      border-radius:50%;
      color:white;
      background:var(--green-900);
      text-decoration:none;
      z-index:3;
      box-shadow:0 8px 18px rgba(13,40,27,.18);
    }

    .login-content{
      position:relative;
      z-index:2;
    }

    .auth-logo{
      width:78px;
      height:78px;
      object-fit:cover;
      border-radius:50%;
      border:3px solid var(--gold);
      display:block;
      margin:0 auto 14px;
      background:white;
      box-shadow:0 10px 24px rgba(13,40,27,.18);
    }

    .login-card h2{
      text-align:center;
      color:var(--green-900);
      font-size:32px;
      line-height:1.15;
      margin-bottom:7px;
    }

    .login-card > .login-content > p{
      text-align:center;
      color:var(--muted);
      font-size:14px;
      margin-bottom:22px;
    }

    .social-title{
      color:var(--green-900);
      font-size:13px;
      font-weight:800;
      margin-bottom:9px;
    }

    .social-buttons{
      display:flex;
      gap:10px;
      margin-bottom:18px;
    }

    .social-btn{
      width:100%;
      height:48px;
      border-radius:13px;
      border:1px solid rgba(13,40,27,.12);
      background:rgba(255,255,255,.88);
      color:var(--text);
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:9px;
      cursor:pointer;
      transition:.3s;
    }

    .social-btn:hover{
      transform:translateY(-3px);
      border-color:rgba(212,175,55,.65);
      box-shadow:0 10px 24px rgba(13,40,27,.12);
    }

    .google span{
      color:#db4437;
      font-size:20px;
      font-weight:900;
    }

    .divider{
      text-align:center;
      color:#8d9991;
      font-size:12px;
      margin:16px 0;
      position:relative;
    }

    .divider::before,
    .divider::after{
      content:"";
      position:absolute;
      top:50%;
      width:42%;
      height:1px;
      background:rgba(13,40,27,.13);
    }

    .divider::before{left:0;}
    .divider::after{right:0;}

    .tabs{
      display:flex;
      padding:4px;
      margin-bottom:17px;
      border-radius:13px;
      background:rgba(223,234,221,.85);
      border:1px solid rgba(13,40,27,.07);
    }

    .tab-btn{
      flex:1;
      padding:10px;
      border:none;
      border-radius:10px;
      background:transparent;
      color:#617067;
      font-weight:800;
      cursor:pointer;
      transition:.3s;
    }

    .tab-btn.active{
      color:white;
      background:linear-gradient(135deg,var(--green-900),var(--green-700));
      box-shadow:0 7px 18px rgba(13,40,27,.19);
    }

    .form-group{
      margin-bottom:14px;
      position:relative;
    }

    .form-group input{
      width:100%;
      height:52px;
      padding:0 16px;
      border:none;
      border-bottom:2px solid rgba(13,40,27,.46);
      border-radius:10px 10px 0 0;
      outline:none;
      background:rgba(255,255,255,.52);
      color:var(--text);
      font-size:15px;
      transition:.25s;
    }

    .form-group input:focus{
      background:rgba(255,255,255,.88);
      border-bottom-color:var(--gold-dark);
      box-shadow:0 8px 18px rgba(13,40,27,.06);
    }

    .login-options{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin:3px 0 21px;
      color:var(--muted);
      font-size:13px;
    }

    .login-options label{
      display:flex;
      align-items:center;
      gap:7px;
    }

    .login-options input[type="checkbox"]{
      accent-color:var(--green-700);
    }

    .login-options a{
      color:var(--green-900);
      text-decoration:none;
      font-weight:800;
    }

    .login-options a:hover{
      color:var(--gold-dark);
    }

    .login-btn{
      width:100%;
      height:50px;
      border:none;
      border-radius:10px;
      color:white;
      background:linear-gradient(135deg,var(--green-900),var(--green-700));
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      transition:.3s;
      box-shadow:0 10px 24px rgba(13,40,27,.20);
    }

    .login-btn:hover{
      transform:translateY(-3px);
      background:linear-gradient(135deg,var(--gold),var(--gold-dark));
    }

    .otp-btn{
      margin-top:3px;
      background:linear-gradient(135deg,var(--gold),var(--gold-dark));
    }

    .otp-btn:hover{
      background:linear-gradient(135deg,var(--green-900),var(--green-700));
    }

    .signup{
      margin-top:20px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
    }

    .signup a{
      color:var(--green-900);
      font-weight:900;
      text-decoration:none;
    }

    .signup a:hover{
      color:var(--gold-dark);
    }

    .hide{
      display:none;
    }

    @media(max-width:780px){
      .login-header{
        padding:0 20px;
      }

      .login-nav{
        gap:15px;
      }

      .login-nav a:not(.nav-login){
        display:none;
      }
    }

    @media(max-width:520px){
      .login-page{
        padding:105px 12px 22px;
      }

      .login-card{
        padding:34px 22px 28px;
        border-radius:22px;
      }

      .login-card h2{
        font-size:28px;
      }

      .login-options{
        flex-direction:column;
        align-items:flex-start;
      }
    }
  </style>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

  <header class="login-header">

    <a href="homepage.html" class="brand">
      <img src="../assets/main_logo.jpeg" alt="Neolife Logo">

      <div>
        <strong>Neolife Wellness Center</strong>
        <span>Ayush Digital Care</span>
      </div>
    </a>

    <nav class="login-nav">
      <a href="homepage.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Therapies</a>
      <a href="beauty-cosmetics.html">Beauty</a>
      <a href="contact.html">Contact</a>
      <a href="login.html" class="nav-login">Login</a>
    </nav>

  </header>

  <main class="login-page">

    <div class="login-shell">

      <div class="login-card">

        <a href="homepage.html" class="close-button" aria-label="Close">
          <i class="fa-solid fa-xmark"></i>
        </a>

        <div class="login-content">

          <img src="../assets/main_logo.jpeg"
               class="auth-logo"
               alt="Neolife Logo">

          <h2>Patient Login</h2>

          <p>Welcome back. Continue your Neolife wellness journey.</p>

          <div class="social-title">Continue with</div>

          <div class="social-buttons">
            <button class="social-btn google"
                    type="button"
                    onclick="startGoogleLogin()">
              <span>G</span>
              Google
            </button>
          </div>

          <div class="divider">or</div>

          <div class="tabs">
            <button class="tab-btn active"
                    id="emailTab"
                    type="button"
                    onclick="showEmailLogin()">
              Email Login
            </button>

            <button class="tab-btn"
                    id="phoneTab"
                    type="button"
                    onclick="showPhoneLogin()">
              Phone OTP
            </button>
          </div>

          <form id="emailLoginForm"
                onsubmit="return emailLogin(event)">

            <div class="form-group">
              <input type="email"
                     id="email"
                     placeholder="Email Address">
            </div>

            <div class="form-group">
              <input type="password"
                     id="password"
                     placeholder="Password">
            </div>

            <div class="login-options">
              <label>
                <input type="checkbox">
                Remember me
              </label>

              <a href="forgot-password.html">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">
              Login
            </button>

          </form>

          <form id="phoneLoginForm"
                class="hide"
                onsubmit="return verifyOTP()">

            <div class="form-group">
              <input type="tel"
                     id="phone"
                     placeholder="Enter Phone Number"
                     maxlength="10"
                     oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            </div>

            <button type="button"
                    class="login-btn otp-btn"
                    onclick="sendOTP()">
              Send OTP
            </button>

            <div class="form-group" style="margin-top:15px;">
              <input type="text"
                     id="otp"
                     placeholder="Enter OTP"
                     maxlength="6"
                     oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            </div>

            <button type="submit" class="login-btn">
              Verify OTP & Login
            </button>

          </form>

          <div class="signup">
            New patient?
            <a href="register.html">Create account</a>
          </div>

        </div>

      </div>

    </div>

  </main>
<script>
const API_BASE_URL = "http://localhost:8085";

function showEmailLogin(){
  document.getElementById("emailLoginForm").classList.remove("hide");
  document.getElementById("phoneLoginForm").classList.add("hide");
  document.getElementById("emailTab").classList.add("active");
  document.getElementById("phoneTab").classList.remove("active");
}

function showPhoneLogin(){
  document.getElementById("phoneLoginForm").classList.remove("hide");
  document.getElementById("emailLoginForm").classList.add("hide");
  document.getElementById("phoneTab").classList.add("active");
  document.getElementById("emailTab").classList.remove("active");
}

async function emailLogin(event){
    event.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if(email === "" || password === ""){
        alert("Please enter email and password");
        return false;
    }

    try{

        // Step 1: Login
        const loginResponse = await fetch(`${API_BASE_URL}/api/auth/login`,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                email:email,
                password:password
            })
        });

        const loginResult = await loginResponse.json();

        if(!loginResult.success){
            alert(loginResult.message || "Invalid Email or Password");
            return false;
        }

        // Step 2: Save login details
        const token = loginResult.data.token;

        localStorage.setItem("token", token);
        localStorage.setItem("refreshToken", loginResult.data.refreshToken);
        localStorage.setItem("userId", loginResult.data.id);
        localStorage.setItem("email", loginResult.data.email);
        localStorage.setItem("isLoggedIn","true");

        // Step 3: Try User Profile API
let profileResponse = await fetch(`${API_BASE_URL}/api/users/getProfile`, {
    method: "GET",
    headers: {
        "Authorization": "Bearer " + token
    }
});

let profileResult = await profileResponse.json();

// If user API says only users can access, try Admin API
if (!profileResult.success && profileResult.message === "Only users can access this API") {

    profileResponse = await fetch(`${API_BASE_URL}/api/admin/getAdminProfile`, {
        method: "GET",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    profileResult = await profileResponse.json();
}

if (!profileResult.success) {
    alert(profileResult.message || "Unable to fetch profile");
    return false;
}

// Save profile details
localStorage.setItem("name", profileResult.data.name);
localStorage.setItem("phoneNumber", profileResult.data.phoneNumber);
localStorage.setItem("age", profileResult.data.age);
localStorage.setItem("gender", profileResult.data.gender);
localStorage.setItem("role", profileResult.data.role);

// Redirect
if (profileResult.data.role === "ADMIN") {
    alert("Welcome Admin");
    window.location.href = "../admin/admin-dashboard.html";
} else {
    alert("Welcome " + profileResult.data.name);
    window.location.href = "profile.html";
}
    }catch(error){
        console.log(error);
        alert("Unable to connect to backend.");
    }

    return false;
}

async function sendOTP(){
  alert("Phone OTP API is not available now. Use Email Login.");
}

async function verifyOTP(){
  alert("Phone OTP API is not available now. Use Email Login.");
  return false;
}

let googleReady = false;

window.onload = function(){
  initGoogleLogin();
};

function initGoogleLogin(){
  google.accounts.id.initialize({
    client_id: "277109720887-bd1pfueg8eodgbm76qh18kn8rc22quvl.apps.googleusercontent.com",
    callback: handleGoogleResponse,
    use_fedcm_for_prompt: false
  });

  googleReady = true;
}

function startGoogleLogin(){
  if(!googleReady){
    alert("Google login is loading. Try again.");
    return;
  }

  google.accounts.id.prompt();
}

async function handleGoogleResponse(response){
  const res = await fetch(`${API_BASE_URL}/api/auth/google-login`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      idToken: response.credential
    })
  });

  const result = await res.json();

  if(result.success){
    localStorage.setItem("token", result.data.token);
    localStorage.setItem("refreshToken", result.data.refreshToken);
    localStorage.setItem("userId", result.data.id);
    localStorage.setItem("email", result.data.email);
    localStorage.setItem("isLoggedIn", "true");

    alert("Google login successful");
    window.location.href = "profile.html";
  }else{
    alert(result.message || "Google login failed");
  }
}


</script>
</body>
</html>
