<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile - Neolife Wellness Center</title>
<link rel="icon" type="image/jpeg" href="../assets/main_logo.jpeg">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI",sans-serif;
}

body{
  background:#fffaf0;
  color:#2b2b2b;
}

header{
  background:linear-gradient(135deg,#123524,#2f6b3f);
  padding:14px 7%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  position:sticky;
  top:0;
  z-index:1000;
  box-shadow:0 6px 20px rgba(0,0,0,0.25);
}

.logo-container{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo-img{
  width:60px;
  height:60px;
  border-radius:50%;
  border:3px solid #f8f5ec;
  object-fit:cover;
}

.logo-details{
  display:flex;
  flex-direction:column;
}

.logo-text{
  color:#fff;
  font-size:23px;
  font-weight:800;
}

.logo-subtitle{
  color:#f6d76b;
  font-size:14px;
}

.navbar a{
  color:white;
  text-decoration:none;
  margin-left:22px;
  font-weight:600;
}

.navbar a:hover{
  color:#f6d76b;
}

.profile-section{
  padding:70px 8%;
}

.profile-container{
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns:320px 1fr;
  gap:30px;
}

.profile-card{
  background:white;
  border-radius:25px;
  padding:30px;
  text-align:center;
  border:1px solid rgba(212,175,55,0.5);
  box-shadow:0 15px 35px rgba(0,0,0,0.1);
}

.profile-avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  background:linear-gradient(135deg,#123524,#2f6b3f);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:48px;
  font-weight:800;
  margin:0 auto 18px;
  border:4px solid #d4af37;
}

.profile-card h2{
  color:#123524;
  margin-bottom:6px;
}

.profile-card p{
  color:#666;
  margin-bottom:18px;
}

.profile-menu{
  margin-top:25px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.profile-menu button{
  padding:13px;
  border:none;
  border-radius:25px;
  background:#fff7df;
  color:#123524;
  font-weight:800;
  cursor:pointer;
  border:1px solid #e0c56e;
}

.profile-menu button.active,
.profile-menu button:hover{
  background:linear-gradient(135deg,#123524,#2f6b3f);
  color:white;
}

.profile-content{
  background:rgb(255, 255, 255);
  border-radius:25px;
  padding:35px;
  border:1px solid rgba(212,175,55,0.5);
  box-shadow:0 15px 35px rgba(0,0,0,0.1);
}

.profile-content h1{
  color:#123524;
  margin-bottom:25px;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.form-group{
  display:flex;
  flex-direction:column;
}

.form-group label{
  color:#123524;
  font-weight:700;
  margin-bottom:7px;
}

.form-group input,
.form-group select,
.form-group textarea{
  padding:14px;
  border-radius:12px;
  border:1px solid #d8c275;
  outline:none;
  font-size:15px;
}

.form-group textarea{
  resize:vertical;
  min-height:90px;
}

.full{
  grid-column:1 / -1;
}

.save-btn{
  margin-top:25px;
  padding:14px 35px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#d4af37,#b8860b);
  color:white;
  font-weight:800;
  cursor:pointer;
  font-size:15px;
}

.logout-btn{
  margin-top:15px;
  padding:13px 30px;
  border:none;
  border-radius:30px;
  background:#b00020;
  color:white;
  font-weight:800;
  cursor:pointer;
}

.info-box{
  background:#fff7df;
  border:1px solid #e0c56e;
  border-radius:18px;
  padding:18px;
  margin-bottom:18px;
}

.info-box h3{
  color:#123524;
  margin-bottom:8px;
}

.info-box p{
  color:#555;
  line-height:1.7;
}

.footer{
  background:linear-gradient(135deg,#123524,#1d4f32);
  color:#f7e7a0;
  text-align:center;
  padding:25px;
  border-top:4px solid #d4af37;
}

@media(max-width:850px){
  .profile-container{
    grid-template-columns:1fr;
  }

  .form-grid{
    grid-template-columns:1fr;
  }

  header{
    flex-direction:column;
    gap:15px;
  }

  .navbar{
    text-align:center;
  }

  .navbar a{
    display:inline-block;
    margin:8px 10px;
  }
}
.profile-icon{
    width:45px;
    height:45px;
    border-radius:50%;
    background:linear-gradient(135deg,#123524,#2f6b3f);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    border:2px solid #d4af37;
    text-decoration:none;
    transition:.3s;
}

.profile-icon:hover{
    transform:scale(1.1);
}
.nav-right{
    display:flex;
    align-items:center;
    gap:25px;
}
</style>
</head>

<body>

<header>
  <div class="logo-container">
    <img src="../assets/main_logo.jpeg" alt="Neolife Logo" class="logo-img">

    <div class="logo-details">
      <span class="logo-text">Neolife Wellness Center</span>
      <span class="logo-subtitle">Ayush Wellness Center</span>
    </div>
  </div>
<div class="nav-right">
  <nav class="navbar">
    <a href="homepage.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Therapies</a>
    <a href="products.html">Products</a>
    <a href="consultation.html">Consultation</a>
    <a href="contact.html">Contact</a>
   
   
    <!-- // this will Show First Letter of Customer Name (Like Amazon) -->
    <!-- <a href="profile.html" class="profile-circle" id="profileCircle">
    N
</a> -->
  </nav>
  <a href="profile.html" class="profile-icon">
    <i class="fa-solid fa-user"></i>
</a>
</div>
</header>

<section class="profile-section">
  <div class="profile-container">

    <div class="profile-card">
      <div class="profile-avatar" id="profileAvatar">N</div>
      <h2 id="profileName">Neolife User</h2>
      <p id="profileEmail">user@email.com</p>

      <div class="profile-menu">
        <button class="active" onclick="showTab('profile', this)">My Profile</button>
        <button onclick="showTab('orders', this)">My Orders</button>
        <!-- <button onclick="showTab('consultations', this)">Consultations</button> -->
        <button onclick="showTab('address', this)">Address</button>
        <button onclick="showTab('clinicReviews', this)">Clinic Reviews</button>
      </div>

      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="profile-content" id="contentArea">

      <h1>My Profile</h1>

      <div class="form-grid">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="Enter full name">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Enter email">
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" id="phone" placeholder="Enter phone number">
        </div>

        <div class="form-group">
          <label>Age</label>
          <input type="number" id="age" placeholder="Enter age">
        </div>

        <div class="form-group">
          <label>Gender</label>
          <select id="gender">
  <option value="">Select Gender</option>
  <option value="MALE">Male</option>
  <option value="FEMALE">Female</option>
  <option value="OTHER">Other</option>
</select>
        </div>

        <div class="form-group">
          <label>City</label>
          <input type="text" id="city" placeholder="Enter city">
        </div>

        
      </div>

      <button class="save-btn" onclick="saveProfile()">Save Profile</button>

    </div>

  </div>
</section>

<footer class="footer">
  <p>© 2026 Neolife Wellness Center. All Rights Reserved.</p>
</footer>

<script>
const API_BASE_URL = "http://localhost:8085";

async function loadProfile(){
  const token = localStorage.getItem("token");

  if(!token){
    alert("Please login first");
    window.location.href = "login.html";
    return;
  }

  try{
    const response = await fetch(`${API_BASE_URL}/api/users/getProfile`, {
      method: "GET",
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const result = await response.json();

    if(result.success === true){
      const user = result.data;

      document.getElementById("profileName").innerText = user.name;
      document.getElementById("profileEmail").innerText = user.email;
      document.getElementById("profileAvatar").innerText = user.name.charAt(0).toUpperCase();

      document.getElementById("fullName").value = user.name || "";
      document.getElementById("email").value = user.email || "";
      document.getElementById("phone").value = user.phoneNumber || "";
      document.getElementById("age").value = user.age || "";
      document.getElementById("gender").value = user.gender || "";

      if(user.addresses && user.addresses.length > 0){
        localStorage.setItem("addresses", JSON.stringify(user.addresses));
      }

    } else {
      alert(result.message || "Unable to load profile");
      window.location.href = "login.html";
    }

  } catch(error){
    alert("Backend not connected or token expired");
    console.log(error);
  }
}

async function saveProfile(){
  const token = localStorage.getItem("token");

  if(!token){
    alert("Please login first");
    window.location.href = "login.html";
    return;
  }

  const profileData = {
    name: document.getElementById("fullName").value.trim(),
    email: document.getElementById("email").value.trim(),
    phoneNumber: document.getElementById("phone").value.trim(),
    age: Number(document.getElementById("age").value),
    gender: document.getElementById("gender").value
  };

  const response = await fetch(`${API_BASE_URL}/api/users/updateProfile`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify(profileData)
  });

  const result = await response.json();

  if(result.success){
    alert("Profile updated successfully");
    loadProfile();
  }else{
    alert(result.message || "Profile update failed");
  }
}

function showTab(tab, btn){
  document.querySelectorAll(".profile-menu button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  let content = document.getElementById("contentArea");

  if(tab === "profile"){
    location.reload();
  }

  if(tab === "orders"){
    content.innerHTML = `
      <h1>My Orders</h1>
      <div class="info-box">
        <h3>No Orders Yet</h3>
        <p>Your product orders will appear here after you place an order.</p>
      </div>
    `;
  }


  if(tab === "consultations"){
    content.innerHTML = `
      <h1>My Consultations</h1>

      <div class="info-box">
        <h3>No Consultations Yet</h3>
        <p>Your appointment and online consultation history will appear here.</p>
      </div>
    `;
  }

if(tab === "address"){
  content.innerHTML = `
    <h1>My Address</h1>

    <div class="info-box">
      <h3 id="addressFormTitle">Add New Address</h3>

      <input type="hidden" id="addressId">

      <div class="form-grid">
        <div class="form-group">
          <label>House No</label>
          <input type="text" id="houseNo" placeholder="Enter house / flat number">
        </div>

        <div class="form-group">
          <label>Street</label>
          <input type="text" id="street" placeholder="Enter street">
        </div>

        <div class="form-group">
          <label>City</label>
          <input type="text" id="addressCity" placeholder="Enter city">
        </div>

        <div class="form-group">
          <label>State</label>
          <input type="text" id="state" placeholder="Enter state">
        </div>

        <div class="form-group">
          <label>Pincode</label>
          <input type="text" id="pincode" placeholder="Enter pincode">
        </div>

        <div class="form-group">
          <label>Landmark</label>
          <input type="text" id="landmark" placeholder="Enter landmark">
        </div>

        <div class="form-group">
          <label>Address Type</label>
          <select id="addressType">
            <option value="Home">Home</option>
            <option value="Work">Work</option>
            <option value="Office">Office</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Default Address</label>
          <select id="isDefault">
            <option value="false">No</option>
            <option value="true">Yes</option>
          </select>
        </div>
      </div>

      <button class="save-btn" onclick="saveAddress()">Save Address</button>
      <button class="logout-btn" onclick="clearAddressForm()">Cancel</button>
    </div>

    <div id="addressList"></div>
  `;

  setTimeout(loadAddresses, 100);
}

if(tab === "clinicReviews"){
    content.innerHTML = `
        <h1>Clinic Reviews</h1>

        <div class="info-box">
            <h3>Write a Clinic Review</h3>
            <p>Share your experience about doctor consultation, therapy or treatment.</p>

            <button class="save-btn"
                onclick="window.location.href='write-review.html'">
                Write Review
            </button>
        </div>

        <div id="myReviews"></div>
    `;
    setTimeout(loadMyReviews, 100);
}
  

}


 

async function loadAddresses(){
  const token = localStorage.getItem("token");

  try{
    const response = await fetch(`${API_BASE_URL}/api/address/get`, {
      method: "GET",
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const result = await response.json();

    const addressList = document.getElementById("addressList");

    if(!result.success || !result.data || result.data.length === 0){
      addressList.innerHTML = `
        <div class="info-box">
          <h3>No Address Found</h3>
          <p>Your saved address will appear here.</p>
        </div>
      `;
      return;
    }

    let html = `<h2 style="margin:25px 0;color:#123524;">Saved Addresses</h2>`;

    result.data.forEach(address => {
      html += `
        <div class="info-box">
          <h3>
            ${address.addressType || "Address"}
            ${address.isDefault ? " ✅ Default" : ""}
          </h3>

          <p>
            <b>${address.fullName || ""}</b><br>
            Phone: ${address.phone || "-"}<br>
            ${address.houseNo || ""}, ${address.street || ""}<br>
            ${address.city || ""}, ${address.state || ""} - ${address.pincode || ""}<br>
            Landmark: ${address.landmark || "N/A"}
          </p>

          <button class="save-btn" onclick='editAddress(${JSON.stringify(address)})'>
            Edit
          </button>

          <button class="logout-btn" onclick="deleteAddress(${address.id})">
            Delete
          </button>

          ${!address.isDefault ? `
            <button class="save-btn" onclick="setDefaultAddress(${address.id})">
              Make Default
            </button>
          ` : ""}
        </div>
      `;
    });

    addressList.innerHTML = html;

  }catch(error){
    console.log(error);
    alert("Address loading failed");
  }
}

async function saveAddress(){
  const token = localStorage.getItem("token");
  const addressId = document.getElementById("addressId").value;

  const addressData = {
    houseNo: document.getElementById("houseNo").value,
    street: document.getElementById("street").value,
    city: document.getElementById("addressCity").value,
    state: document.getElementById("state").value,
    pincode: document.getElementById("pincode").value,
    landmark: document.getElementById("landmark").value,
    addressType: document.getElementById("addressType").value,
    isDefault: document.getElementById("isDefault").value === "true"
  };

  const url = addressId
    ? `${API_BASE_URL}/api/address/update/${addressId}`
    : `${API_BASE_URL}/api/address/add`;

  const method = addressId ? "PUT" : "POST";

  try{
    const response = await fetch(url, {
      method: method,
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify(addressData)
    });

    const result = await response.json();

    if(result.success){
      alert(result.message || "Address saved successfully");
      clearAddressForm();
      loadAddresses();
    }else{
      alert(result.message || "Address save failed");
    }

  }catch(error){
    console.log(error);
    alert("Address save failed");
  }
}

function editAddress(address){
  document.getElementById("addressFormTitle").innerText = "Edit Address";
  document.getElementById("addressId").value = address.id;
  document.getElementById("houseNo").value = address.houseNo || "";
  document.getElementById("street").value = address.street || "";
  document.getElementById("addressCity").value = address.city || "";
  document.getElementById("state").value = address.state || "";
  document.getElementById("pincode").value = address.pincode || "";
  document.getElementById("landmark").value = address.landmark || "";
  document.getElementById("addressType").value = address.addressType || "Home";
  document.getElementById("isDefault").value = String(address.isDefault || false);

  window.scrollTo({ top: 0, behavior: "smooth" });
}

async function deleteAddress(id){
  const token = localStorage.getItem("token");

  if(!confirm("Are you sure you want to delete this address?")){
    return;
  }

  const response = await fetch(`${API_BASE_URL}/api/address/delete/${id}`, {
    method: "DELETE",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const result = await response.json();

  alert(result.message || "Address deleted");
  loadAddresses();
}

async function setDefaultAddress(id){
  const token = localStorage.getItem("token");

  const response = await fetch(`${API_BASE_URL}/api/address/${id}/default`, {
    method: "PUT",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const result = await response.json();

  alert(result.message || "Default address updated");
  loadAddresses();
}

function clearAddressForm(){
  document.getElementById("addressFormTitle").innerText = "Add New Address";
  document.getElementById("addressId").value = "";
  document.getElementById("houseNo").value = "";
  document.getElementById("street").value = "";
  document.getElementById("addressCity").value = "";
  document.getElementById("state").value = "";
  document.getElementById("pincode").value = "";
  document.getElementById("landmark").value = "";
  document.getElementById("addressType").value = "Home";
  document.getElementById("isDefault").value = "false";
}

function logout(){
  localStorage.clear();
  alert("Logged out successfully");
  window.location.href = "login.html";
}
async function loadMyReviews() {
  const token = localStorage.getItem("token");

  const response = await fetch(`${API_BASE_URL}/api/clinic-reviews/my-reviews`, {
    method: "GET",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const result = await response.json();

  if (!result.success) return;

  let html = "";

  result.data.forEach(review => {
    html += `
      <div class="info-box">
        <h3>${review.doctor}</h3>

        <p>
          <b>Therapy:</b> ${review.therapyService}<br>
          <b>Rating:</b> ${"⭐".repeat(review.rating)}<br>
          <b>Status:</b> ${review.status}<br><br>
          ${review.message}
        </p>

        <button class="save-btn" onclick="editReview(${review.id})">
          Edit Review
        </button>
      </div>
    `;
  });

  document.getElementById("myReviews").innerHTML =
    html || "<p>No reviews found.</p>";
}
function editReview(id){
  window.location.href = `write-review.html?id=${id}`;
}
loadProfile();

</script>

</body>
</html>
