<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Register - Neolife Wellness Center</title>
  <link rel="icon" type="image/jpeg" href="../assets/prod_logo.png">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Segoe UI", Arial, sans-serif;
    }

    body{
      min-height:100vh;
       background: linear-gradient(rgba(15,61,29,0.70), rgba(15,61,29,0.70));
      background-size:cover;
      background-position:center;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:25px;
    }

    .register-card{
      width:100%;
      max-width:520px;
      background:rgba(255,255,255,0.16);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.28);
      border-radius:32px;
      padding:38px;
      position:relative;
      overflow:hidden;
      box-shadow:0 20px 50px rgba(0,0,0,0.35);
      animation:fadeUp 0.8s ease;
    }

    .register-card::before{
      content:"";
      position:absolute;
      width:300px;
      height:300px;
      background:rgba(255,215,106,0.14);
      border-radius:50%;
      top:-130px;
      right:-130px;
    }

    .register-card::after{
      content:"";
      position:absolute;
      width:220px;
      height:220px;
      background:rgba(255,255,255,0.08);
      border-radius:50%;
      bottom:-100px;
      left:-100px;
    }

    .register-content{
      position:relative;
      z-index:2;
    }

    .auth-logo{
      width:90px;
      height:90px;
      object-fit:cover;
      border-radius:50%;
      border:4px solid #ffd76a;
      background:white;
      display:block;
      margin:0 auto 16px;
      box-shadow:0 8px 25px rgba(0,0,0,0.25);
    }

    .register-card h2{
      color:white;
      text-align:center;
      font-size:32px;
      margin-bottom:8px;
    }

    .register-card p{
      color:#f2f2f2;
      text-align:center;
      font-size:15px;
      margin-bottom:22px;
    }

    .form-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .form-group{
      margin-bottom:14px;
    }

    .form-group input,
    .form-group select{
      width:100%;
      height:50px;
      border:none;
      border-radius:16px;
      background:rgba(255,255,255,0.92);
      padding:0 17px;
      font-size:15px;
      outline:none;
      color:#1f2937;
      transition:0.3s;
    }

    .form-group input:focus,
    .form-group select:focus{
      box-shadow:0 0 0 3px rgba(255,215,106,0.38);
      background:white;
      transform:scale(1.02);
    }

    .register-btn{
      width:100%;
      height:52px;
      border:none;
      border-radius:50px;
      background:linear-gradient(135deg,#ffd76a,#d4a017);
      color:#1b5e20;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 8px 22px rgba(212,160,23,0.38);
      margin-top:8px;
    }

    .register-btn:hover{
      transform:translateY(-4px);
      box-shadow:0 15px 30px rgba(212,160,23,0.48);
    }

    .auth-link{
      text-align:center;
      margin-top:22px;
      font-size:14px;
      color:white;
    }

    .auth-link a{
      color:#ffd76a;
      font-weight:800;
      text-decoration:none;
    }

    .auth-link a:hover{
      text-decoration:underline;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(35px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:520px){
      .register-card{
        padding:30px 22px;
        border-radius:26px;
      }

      .form-row{
        grid-template-columns:1fr;
        gap:0;
      }

      .register-card h2{
        font-size:28px;
      }

      .auth-logo{
        width:75px;
        height:75px;
      }
    }
  </style>
</head>

<body>

<div class="register-card">
  <div class="register-content">

    <img src="../assets/main_logo.jpeg" class="auth-logo" alt="Neolife Logo">

    <h2>Patient Registration</h2>
    <p>Create your account to book online consultation</p>

    <form id="registerForm" onsubmit="return registerUser(event)">

      <div class="form-group">
        <input type="text" id="name" placeholder="Full Name" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <input 
            type="tel" 
            id="phoneNumber" 
            placeholder="Phone Number"
            maxlength="10"
            required>
        </div>

        <div class="form-group">
          <input type="email" id="email" placeholder="Email Address" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <input type="number" id="age" placeholder="Age" min="1" max="120" required>
        </div>

        <div class="form-group">
         <select id="gender" required>
  <option value="">Select Gender</option>
  <option value="MALE">Male</option>
  <option value="FEMALE">Female</option>
  <option value="OTHER">Other</option>
</select>
        </div>
      </div>

      <div class="form-group">
        <input type="password" id="password" placeholder="Create Password" required>
      </div>

      <div class="form-group">
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
      </div>

      <button type="submit" class="register-btn">
        Register
      </button>

    </form>

    <p class="auth-link">
      Already have an account? <a href="login.html">Login here</a>
    </p>

  </div>
</div>

<script>
const API_BASE_URL = "http://localhost:8085";

async function registerUser(event){
  event.preventDefault();

  const name = document.getElementById("name").value.trim();
  const phoneNumber = document.getElementById("phoneNumber").value.trim();
  const email = document.getElementById("email").value.trim();
  const age = document.getElementById("age").value.trim();
  const gender = document.getElementById("gender").value;
  const password = document.getElementById("password").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();

  if(!name || !phoneNumber || !email || !age || !gender || !password || !confirmPassword){
    alert("Please fill all fields");
    return false;
  }

  if(phoneNumber.length !== 10){
    alert("Phone number must be 10 digits");
    return false;
  }

  if(password !== confirmPassword){
    alert("Password and confirm password do not match");
    return false;
  }

  try{
    const response = await fetch(`${API_BASE_URL}/api/auth/register`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: name,
        phoneNumber: phoneNumber,
        email: email,
        age: Number(age),
        gender: gender,
        password: password,
        confirmPassword: confirmPassword
      })
    });

    const result = await response.json();

    if(result.success === true){
      alert("Registration successful. Please login.");
      window.location.href = "login.html";
    }else{
      alert(result.message || "Registration failed");
    }

  }catch(error){
    alert("Backend not connected. Start Spring Boot backend on port 8085.");
    console.log(error);
  }

  return false;
}
</script>

</body>
</html>
