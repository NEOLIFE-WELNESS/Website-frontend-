<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify OTP - Neolife</title>
<link rel="icon" href="../assets/prod_logo.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#123524,#6f8f77);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.auth-card{
  width:100%;
  max-width:440px;
  padding:38px;
  background:rgba(255,255,255,0.18);
  border:1px solid rgba(255,255,255,0.35);
  border-radius:28px;
  text-align:center;
  color:white;
  box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

.logo{
  width:85px;
  height:85px;
  border-radius:50%;
  margin-bottom:18px;
  border:3px solid #d4af37;
}

h1{
  font-size:32px;
  margin-bottom:10px;
}

p{
  font-size:15px;
  margin-bottom:24px;
}

.otp-box{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-bottom:20px;
}

.otp-box input{
  width:48px;
  height:55px;
  text-align:center;
  font-size:22px;
  font-weight:800;
  border:none;
  border-radius:12px;
  outline:none;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#ffd86b,#d4af37);
  color:#123524;
  font-weight:800;
  cursor:pointer;
}

.resend{
  margin-bottom:18px;
  font-size:14px;
  color:#ffd86b;
  font-weight:700;
}

.link{
  margin-top:20px;
  font-size:14px;
}

.link a{
  color:#ffd86b;
  font-weight:800;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="auth-card">
  <img src="../assets/pro_logo.jpeg" class="logo" alt="Neolife Logo">

  <h1>Verify OTP</h1>
  <p>A 6-digit code has been sent to your email.</p>

  <div class="otp-box">
    <input maxlength="1" oninput="moveNext(this,0)">
    <input maxlength="1" oninput="moveNext(this,1)">
    <input maxlength="1" oninput="moveNext(this,2)">
    <input maxlength="1" oninput="moveNext(this,3)">
    <input maxlength="1" oninput="moveNext(this,4)">
    <input maxlength="1" oninput="moveNext(this,5)">
  </div>

  <div class="resend" id="timer">Resend OTP in 30s</div>

  <button onclick="verifyOTP()">Verify OTP</button>

  <div class="link">
    <a href="forgot-password.html">Change Email Address</a>
  </div>
</div>

<script>
let inputs = document.querySelectorAll(".otp-box input");

function moveNext(input,index){
  input.value = input.value.replace(/[^0-9]/g,"");

  if(input.value && index < inputs.length - 1){
    inputs[index + 1].focus();
  }
}

inputs.forEach((input,index)=>{
  input.addEventListener("keydown",function(e){
    if(e.key === "Backspace" && input.value === "" && index > 0){
      inputs[index - 1].focus();
    }
  });
});

function verifyOTP(){
  let enteredOTP = "";

  inputs.forEach(input=>{
    enteredOTP += input.value;
  });

  let savedOTP = localStorage.getItem("resetOTP");

  if(enteredOTP.length !== 6){
    alert("Please enter 6 digit OTP");
    return;
  }

  if(enteredOTP === savedOTP){
    alert("OTP verified successfully");
    window.location.href = "reset-password.html";
  }else{
    alert("Invalid OTP");
  }
}

let time = 30;
let timer = document.getElementById("timer");

let countdown = setInterval(()=>{
  time--;
  timer.innerText = "Resend OTP in " + time + "s";

  if(time <= 0){
    clearInterval(countdown);
    timer.innerHTML = `<span onclick="resendOTP()" style="cursor:pointer;">Resend OTP</span>`;
  }
},1000);

function resendOTP(){
  let otp = Math.floor(100000 + Math.random() * 900000);
  localStorage.setItem("resetOTP", otp);
  alert("New Testing OTP: " + otp);
  location.reload();
}
</script>

</body>
</html>
