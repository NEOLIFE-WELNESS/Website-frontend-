<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - Neolife</title>
<link rel="icon" href="../assets/prod_logo.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#123524,#6f8f77);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.auth-card{
  width:100%;
  max-width:420px;
  padding:38px;
  background:rgba(255,255,255,0.18);
  border:1px solid rgba(255,255,255,0.35);
  border-radius:28px;
  text-align:center;
  color:white;
  box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

.logo{
  width:85px;
  height:85px;
  border-radius:50%;
  margin-bottom:18px;
  border:3px solid #d4af37;
}

h1{
  font-size:32px;
  margin-bottom:10px;
}

p{
  font-size:15px;
  margin-bottom:24px;
}

input{
  width:100%;
  padding:16px;
  border:none;
  outline:none;
  border-radius:14px;
  margin-bottom:18px;
  font-size:15px;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#ffd86b,#d4af37);
  color:#123524;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 12px 25px rgba(212,175,55,0.35);
}

.link{
  margin-top:20px;
  font-size:14px;
}

.link a{
  color:#ffd86b;
  font-weight:800;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="auth-card">
  <img src="../assets/main_logo.jpeg" class="logo" alt="Neolife Logo">

  <h1>Forgot Password</h1>
  <p>Enter your registered email to receive password reset OTP.</p>

  <input type="email" id="email" placeholder="Enter Email Address" required>

  <button onclick="sendOTP()">Send Reset OTP</button>

  <div class="link">
    Remember password? <a href="login.html">Login here</a>
  </div>
</div>

<script>
function sendOTP(){
  let email = document.getElementById("email").value.trim();

  if(email === ""){
    alert("Please enter your email address");
    return;
  }

  let otp = Math.floor(100000 + Math.random() * 900000);

  localStorage.setItem("resetEmail", email);
  localStorage.setItem("resetOTP", otp);

  alert("Testing OTP: " + otp);

  window.location.href = "verify-otp.html";
}
</script>

</body>
</html>
