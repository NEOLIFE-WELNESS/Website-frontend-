<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - Neolife</title>
<link rel="icon" href="../assets/main_logo.jpeg">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#123524,#6f8f77);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.auth-card{
  width:100%;
  max-width:420px;
  padding:38px;
  background:rgba(255,255,255,0.18);
  border:1px solid rgba(255,255,255,0.35);
  border-radius:28px;
  text-align:center;
  color:white;
  box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

.logo{
  width:85px;
  height:85px;
  border-radius:50%;
  margin-bottom:18px;
  border:3px solid #d4af37;
}

h1{
  font-size:32px;
  margin-bottom:10px;
}

p{
  font-size:15px;
  margin-bottom:24px;
}

input{
  width:100%;
  padding:16px;
  border:none;
  outline:none;
  border-radius:14px;
  margin-bottom:18px;
  font-size:15px;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#ffd86b,#d4af37);
  color:#123524;
  font-weight:800;
  cursor:pointer;
}

.link{
  margin-top:20px;
  font-size:14px;
}

.link a{
  color:#ffd86b;
  font-weight:800;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="auth-card">
  <img src="../assets/pro_logo.jpeg" class="logo" alt="Neolife Logo">

  <h1>Create New Password</h1>
  <p>Enter and confirm your new password.</p>

  <input type="password" id="newPassword" placeholder="New Password">
  <input type="password" id="confirmPassword" placeholder="Confirm Password">

  <button onclick="resetPassword()">Reset Password</button>

  <div class="link">
    Remember password? <a href="login.html">Login here</a>
  </div>
</div>

<script>
const API_BASE_URL = "http://localhost:8085";

async function resetPassword(){
  const newPassword = document.getElementById("newPassword").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();
  const resetToken = localStorage.getItem("resetToken");

  if(!resetToken){
    alert("Reset token not found. Please try forgot password again.");
    window.location.href = "forgot-password.html";
    return;
  }

  if(newPassword === "" || confirmPassword === ""){
    alert("Please fill both password fields");
    return;
  }

  if(newPassword.length < 6){
    alert("Password must be at least 6 characters");
    return;
  }

  if(newPassword !== confirmPassword){
    alert("Passwords do not match");
    return;
  }

  try{
    const response = await fetch(`${API_BASE_URL}/api/auth/reset-password`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
  resetToken: resetToken,
  newPassword: newPassword,
  confirmPassword: confirmPassword
})
    });

    const result = await response.json();

    if(result.success === true){
      localStorage.removeItem("resetToken");
      localStorage.removeItem("resetEmail");

      alert("Password reset successfully. Please login.");
      window.location.href = "login.html";
    }else{
      alert(result.message || "Password reset failed");
    }

  }catch(error){
    alert("Backend not connected. Start Spring Boot backend on port 8085.");
    console.log(error);
  }
}
</script>
</body>
</html>
