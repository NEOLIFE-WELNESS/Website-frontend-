<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blogs - Neolife Wellness Center</title>
  <link rel="icon" type="image/jpeg" href="../assets/prod_logo.png">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<header class="glass-header">

  <div class="logo-container">
    <img src="../assets/prod_logo.png" alt="Neolife Logo" class="logo-img">

    <div class="logo-details">
      <span class="logo-text">Neolife Wellness Center</span>
      <span class="logo-subtitle">Ayush Wellness Center</span>
    </div>
  </div>

  <input type="checkbox" id="menu-toggle">

  <label for="menu-toggle" class="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </label>

  <nav class="side-menu">
    <a href="homepage.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Therapies</a>
    <a href="products.html">Products</a>
    <a href="consultation.html">Consultation</a>
    <a href="contact.html">Contact</a>
  </nav>

</header>

<section class="blog-hero">
  <h1>Health & Wellness Blogs</h1>
  <p>Expert Ayurveda, Panchakarma, Yoga and wellness guidance from our doctors.</p>
</section>

<div class="blog-grid" id="blogGrid"></div>

<footer class="footer">
  <div class="footer-bottom">
    <p>© 2026 Neolife Wellness Center. All Rights Reserved.</p>
  </div>
</footer>
<script>
const API_BASE_URL = "http://localhost:8085";
function getImageUrl(imageUrl){
  if(!imageUrl || imageUrl.trim() === ""){
    return "";
  }

  if(imageUrl.startsWith("http")){
    return imageUrl;
  }

  if(imageUrl.startsWith("/")){
    return API_BASE_URL + imageUrl;
  }

  return API_BASE_URL + "/" + imageUrl;
}
window.onload = loadBlogs;

async function loadBlogs(){
  const token = localStorage.getItem("token");

  const response = await fetch(`${API_BASE_URL}/api/blogs/getAll`, {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const result = await response.json();
  const grid = document.getElementById("blogGrid");
  grid.innerHTML = "";

  if(!result.success || !result.data || result.data.length === 0){
    grid.innerHTML = "<p>No blogs found.</p>";
    return;
  }

  result.data
    .filter(blog => blog.published === true)
    .forEach(blog => {
      const image = getImageUrl(blog.imageUrl);

const imageHtml = image
  ? `<img src="${image}" alt="${blog.title}">`
  : "";
      grid.innerHTML += `
        <div class="blog-card">
          ${imageHtml}
          <div class="blog-content">
            <span class="blog-category">${blog.category || "Wellness"}</span>
            <h3>${blog.title}</h3>

            <p class="blog-meta">
              Written by ${blog.authorName || "Neolife Wellness Team"}
            </p>

            <p>
              ${blog.shortDescription || blog.content.substring(0, 130) + "..."}
            </p>

            <a href="blog-details.html?id=${blog.id}" class="blog-btn">Read More</a>
          </div>
        </div>
      `;
    });
}
</script>
</body>
</html>
