<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders - Neolife Wellness Center</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif}
body{background:#f1f3f6}
.container{max-width:1200px;margin:auto;padding:30px 20px}
.heading{font-size:30px;color:#123524;margin-bottom:25px}
.order-card{background:white;border-radius:15px;padding:20px;margin-bottom:20px;box-shadow:0 5px 15px rgba(0,0,0,.1)}
.order-top{display:flex;justify-content:space-between;gap:20px}
.product-info h3{color:#123524;margin-bottom:10px}
.product-info p{color:#666;margin:6px 0}
.status{color:green;font-weight:bold}
.items{margin-top:15px;background:#f8f8f8;padding:12px;border-radius:10px}
.item-row{padding:8px 0;border-bottom:1px solid #ddd}
.item-row:last-child{border-bottom:none}
.right{display:flex;flex-direction:column;gap:12px}
.btn{padding:12px 18px;border:none;border-radius:30px;cursor:pointer;font-weight:600}
.view-btn{background:#123524;color:white}
.track-btn{background:#d4af37;color:white}
.cancel-btn{background:#c62828;color:white}
.empty{text-align:center;color:#777;background:white;padding:40px;border-radius:15px}
@media(max-width:900px){.order-top{flex-direction:column}.right{width:100%}.btn{width:100%}}
</style>
</head>

<body>

<div class="container">
  <h1 class="heading">My Orders</h1>
  <div id="ordersContainer"></div>
</div>

<script>
const API_BASE_URL = "http://localhost:8085";
let orders = [];

window.onload = loadMyOrders;

async function loadMyOrders(){
  const token = localStorage.getItem("token");

  if(!token){
    alert("Please login first");
    window.location.href = "login.html";
    return;
  }

  const response = await fetch(`${API_BASE_URL}/api/orders/getAll`, {
    method: "GET",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const result = await response.json();

  if(result.success){
    orders = (result.data || []).sort((a,b) => b.id - a.id);
    displayOrders();
  }else{
    document.getElementById("ordersContainer").innerHTML =
      `<p class="empty">${result.message || "No orders found"}</p>`;
  }
}

function displayOrders(){
  const container = document.getElementById("ordersContainer");

  if(!orders || orders.length === 0){
    container.innerHTML = `<p class="empty">No orders found.</p>`;
    return;
  }

  container.innerHTML = "";

  orders.forEach(order => {
    let itemsHtml = "";

    if(order.items && order.items.length > 0){
      order.items.forEach(item => {
        itemsHtml += `
          <div class="item-row">
            <b>${item.productName}</b><br>
            Qty: ${item.quantity} | Price: ₹${item.price} | Subtotal: ₹${item.subtotal}
          </div>
        `;
      });
    }else{
      itemsHtml = `<p>No items found.</p>`;
    }

    container.innerHTML += `
      <div class="order-card">
        <div class="order-top">
          <div class="product-info">
            <h3>Order No: ${order.orderNumber}</h3>
            <p><b>Order ID:</b> ${order.id}</p>
            <p><b>Amount:</b> ₹${order.totalAmount}</p>
            <p><b>Address:</b> ${order.shippingAddress || "-"}</p>
            <p><b>Date:</b> ${formatDate(order.orderDate)}</p>
            <p class="status">${order.status}</p>

            <div class="items">
              ${itemsHtml}
            </div>
          </div>

          <div class="right">
            <button class="btn view-btn" onclick="viewOrder(${order.id})">
              <i class="fa-solid fa-eye"></i> View Details
            </button>

            <button class="btn track-btn" onclick="trackOrder(${order.id})">
              <i class="fa-solid fa-truck"></i> Track Order
            </button>

            ${
              order.status !== "CANCELLED"
              ? `<button class="btn cancel-btn" onclick="cancelOrder(${order.id})">
                   Cancel Order
                 </button>`
              : ""
            }
          </div>
        </div>
      </div>
    `;
  });
}

function formatDate(date){
  if(!date) return "-";
  return new Date(date).toLocaleString("en-IN");
}

function viewOrder(id){
  const order = orders.find(o => o.id === id);
  alert(
    "Order No: " + order.orderNumber +
    "\\nStatus: " + order.status +
    "\\nAmount: ₹" + order.totalAmount +
    "\\nAddress: " + order.shippingAddress
  );
}

async function trackOrder(id){
  const token = localStorage.getItem("token");

  const response = await fetch(`${API_BASE_URL}/api/orders/${id}/track`, {
    method: "GET",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const result = await response.json();

  if(result.success){
    alert(result.message || "Tracking available");
  }else{
    alert(result.message || "Shipment not created yet");
  }
}

async function cancelOrder(id){
  const token = localStorage.getItem("token");

  if(!confirm("Are you sure you want to cancel this order?")){
    return;
  }

  const response = await fetch(`${API_BASE_URL}/api/orders/${id}/cancel`, {
    method: "PUT",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const result = await response.json();

  if(result.success){
    alert(result.message || "Order cancelled");
    loadMyOrders();
  }else{
    alert(result.message || "Failed to cancel order");
  }
}
</script>

</body>
</html>
