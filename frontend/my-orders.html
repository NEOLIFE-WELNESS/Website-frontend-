<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders - Neolife Wellness Center</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
background:#f1f3f6;
}

.container{
max-width:1200px;
margin:auto;
padding:30px 20px;
}

.heading{
font-size:30px;
color:#123524;
margin-bottom:25px;
}

.order-card{
background:white;
border-radius:15px;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
transition:.3s;
}

.order-card:hover{
transform:translateY(-5px);
}

.left{
display:flex;
gap:20px;
align-items:center;
}

.product-img{
width:120px;
height:120px;
object-fit:cover;
border-radius:12px;
}

.product-info h3{
color:#123524;
margin-bottom:10px;
}

.product-info p{
color:#666;
margin:6px 0;
}

.status{
color:green;
font-weight:bold;
}

.right{
display:flex;
flex-direction:column;
gap:12px;
}

.btn{
padding:12px 18px;
border:none;
border-radius:30px;
cursor:pointer;
font-weight:600;
}

.view-btn{
background:#123524;
color:white;
}

.track-btn{
background:#d4af37;
color:white;
}

.invoice-btn{
background:#e9ecef;
}

.timeline{
margin-top:15px;
display:flex;
gap:40px;
font-size:14px;
color:#666;
}

.timeline span{
display:flex;
align-items:center;
gap:8px;
}

.timeline i{
color:green;
}

@media(max-width:900px){

.order-card{
flex-direction:column;
align-items:flex-start;
}

.left{
flex-direction:column;
}

.right{
width:100%;
}

.btn{
width:100%;
}

.timeline{
flex-direction:column;
gap:15px;
}

}

</style>
</head>
<body>

<div class="container">

<h1 class="heading">My Orders</h1>

<!-- Order 1 -->

<div class="order-card">

<div class="left">

<img src="../assets/hairoil.jpg" class="product-img">

<div class="product-info">

<h3>Neolife Special Hair Oil</h3>

<p>Order ID : ORD001</p>

<p>Amount : ₹299</p>

<p class="status">Delivered on 18 Jun 2026</p>

<div class="timeline">

<span><i class="fa-solid fa-circle-check"></i> Ordered</span>

<span><i class="fa-solid fa-circle-check"></i> Shipped</span>

<span><i class="fa-solid fa-circle-check"></i> Delivered</span>

</div>

</div>

</div>

<div class="right">

<button class="btn view-btn">
<i class="fa-solid fa-eye"></i>
View Details
</button>

<button class="btn track-btn">
<i class="fa-solid fa-truck"></i>
Track Order
</button>

<button class="btn invoice-btn">
<i class="fa-solid fa-file-pdf"></i>
Download Invoice
</button>

</div>

</div>


<!-- Order 2 -->

<div class="order-card">

<div class="left">

<img src="../assets/liver.jpg" class="product-img">

<div class="product-info">

<h3>Neoliv Liver Syrup</h3>

<p>Order ID : ORD002</p>

<p>Amount : ₹280</p>

<p class="status">Shipped</p>

<div class="timeline">

<span><i class="fa-solid fa-circle-check"></i> Ordered</span>

<span><i class="fa-solid fa-circle-check"></i> Shipped</span>

<span><i class="fa-regular fa-circle"></i> Delivered</span>

</div>

</div>

</div>

<div class="right">

<button class="btn view-btn">
<i class="fa-solid fa-eye"></i>
View Details
</button>

<button class="btn track-btn">
<i class="fa-solid fa-location-dot"></i>
Track Order
</button>

<button class="btn invoice-btn">
<i class="fa-solid fa-file-pdf"></i>
Download Invoice
</button>

</div>

</div>

</div>

</body>
</html>
