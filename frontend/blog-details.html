<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Details - Neolife Wellness Center</title>
  <link rel="icon" type="image/jpeg" href="../assets/main_logo.jpeg">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header class="glass-header">

  <div class="logo-container">
    <img src="../assets/main_logo.jpeg" alt="Neolife Logo" class="logo-img">

    <div class="logo-details">
      <span class="logo-text">Neolife Wellness Center</span>
      <span class="logo-subtitle">Ayush Wellness Center</span>
    </div>
  </div>

  <input type="checkbox" id="menu-toggle">

  <label for="menu-toggle" class="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </label>

  <nav class="side-menu">
    <a href="homepage.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Therapies</a>
    <a href="products.html">Products</a>
    <a href="consultation.html">Consultation</a>
    <a href="contact.html">Contact</a>
  </nav>

</header>

<div class="blog-details-box" id="blogDetailsBox"></div>

<footer class="footer">
  <div class="footer-bottom">
    <p>© 2026 Neolife Wellness Center. All Rights Reserved.</p>
  </div>
</footer>
<script>
const API_BASE_URL = "http://localhost:8085";
function getImageUrl(imageUrl){
  if(!imageUrl || imageUrl.trim() === ""){
    return "";
  }

  if(imageUrl.startsWith("http")){
    return imageUrl;
  }

  if(imageUrl.startsWith("/")){
    return API_BASE_URL + imageUrl;
  }

  return API_BASE_URL + "/" + imageUrl;
}
window.onload = loadBlogDetails;

async function loadBlogDetails(){
  const token = localStorage.getItem("token");
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  const response = await fetch(`${API_BASE_URL}/api/blogs/${id}/get`, {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const result = await response.json();
  const box = document.getElementById("blogDetailsBox");

  if(!result.success){
    box.innerHTML = "<p>Blog not found.</p>";
    return;
  }

  const blog = result.data;
  const image = getImageUrl(blog.imageUrl);

const imageHtml = image
  ? `<img src="${image}" alt="${blog.title}" class="blog-detail-img">`
  : "";
  box.innerHTML = `
    ${imageHtml}

    <span class="blog-category">${blog.category || "Wellness"}</span>

    <h1>${blog.title}</h1>

    <p class="blog-meta">
      Written by: ${blog.authorName || "Neolife Wellness Team"} |
      Published on: ${blog.createdAt ? blog.createdAt.substring(0,10) : ""}
    </p>

    <p>${blog.content}</p>

    <a href="blog.html" class="blog-btn">← Back to Blogs</a>
  `;
}
</script>
</body>
</html>
