<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Write Clinic Review - Neolife</title>
<link rel="icon" href="../assets/main_logo.jpeg">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif}
body{background:#fffaf0;padding:40px}
.review-box{max-width:650px;margin:auto;background:white;padding:35px;border-radius:22px;box-shadow:0 15px 35px rgba(0,0,0,.12);border:1px solid #d4af37}
h1{color:#123524;margin-bottom:20px;text-align:center}
label{display:block;margin-top:15px;font-weight:700;color:#123524}
input,select,textarea{width:100%;padding:13px;margin-top:7px;border:1px solid #d8c275;border-radius:12px;font-size:15px}
textarea{min-height:120px;resize:vertical}
.submit-btn{width:100%;margin-top:25px;padding:14px;border:none;border-radius:30px;background:linear-gradient(135deg,#123524,#2f6b3f);color:white;font-weight:800;cursor:pointer}
.back-btn{display:block;text-align:center;margin-top:18px;color:#123524;text-decoration:none;font-weight:700}
</style>
</head>

<body>

<div class="review-box">
  <h1>Write Clinic Review</h1>

  <label>Doctor</label>
  <input type="text" id="doctor" placeholder="Dr. N. G. Muraleedhara">

  <label>Therapy / Service</label>
  <input type="text" id="therapyService" placeholder="Panchakarma">

  <label>Rating</label>
  <select id="rating">
    <option value="">Select Rating</option>
    <option value="5">★★★★★ 5</option>
    <option value="4">★★★★☆ 4</option>
    <option value="3">★★★☆☆ 3</option>
    <option value="2">★★☆☆☆ 2</option>
    <option value="1">★☆☆☆☆ 1</option>
  </select>

  <label>Review Message</label>
  <textarea id="message" placeholder="Write your treatment experience..."></textarea>

  <label>Photo URL 1</label>
  <input type="text" id="photo1" placeholder="https://example.com/photo1.jpg">

  <label>Photo URL 2</label>
  <input type="text" id="photo2" placeholder="https://example.com/photo2.jpg">

  <button class="submit-btn" onclick="submitReview()">Submit Review</button>

  <a href="profile.html" class="back-btn">Back to Profile</a>
</div>

<script>
const API_BASE_URL = "http://localhost:8085";

const params = new URLSearchParams(window.location.search);
const reviewId = params.get("id");

window.onload = function(){
  if(reviewId){
    document.querySelector("h1").innerText = "Edit Clinic Review";
    document.querySelector(".submit-btn").innerText = "Update Review";
    loadReviewForEdit();
  }
};

async function loadReviewForEdit(){
  const token = localStorage.getItem("token");

  const response = await fetch(`${API_BASE_URL}/api/clinic-reviews/getById/${reviewId}`, {
    method: "GET",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const result = await response.json();

  if(result.success){
    const review = result.data;

    document.getElementById("doctor").value = review.doctor || "";
    document.getElementById("therapyService").value = review.therapyService || "";
    document.getElementById("rating").value = review.rating || "";
    document.getElementById("message").value = review.message || "";

    if(review.photoUrls && review.photoUrls.length > 0){
      document.getElementById("photo1").value = review.photoUrls[0] || "";
      document.getElementById("photo2").value = review.photoUrls[1] || "";
    }
  }
}

async function submitReview(){
  const token = localStorage.getItem("token");

  if(!token){
    alert("Please login first");
    window.location.href = "login.html";
    return;
  }

  const photoUrls = [];
  const photo1 = document.getElementById("photo1").value.trim();
  const photo2 = document.getElementById("photo2").value.trim();

  if(photo1) photoUrls.push(photo1);
  if(photo2) photoUrls.push(photo2);

  const review = {
    doctor: document.getElementById("doctor").value.trim(),
    therapyService: document.getElementById("therapyService").value.trim(),
    rating: Number(document.getElementById("rating").value),
    message: document.getElementById("message").value.trim(),
    photoUrls: photoUrls
  };

  if(!review.doctor || !review.therapyService || !review.rating || !review.message){
    alert("Please fill doctor, service, rating and message");
    return;
  }

  const url = reviewId
    ? `${API_BASE_URL}/api/clinic-reviews/update/${reviewId}`
    : `${API_BASE_URL}/api/clinic-reviews/create`;

  const method = reviewId ? "PUT" : "POST";

  const response = await fetch(url, {
    method: method,
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify(review)
  });

  const result = await response.json();

  if(result.success){
    alert(reviewId ? "Review updated successfully" : "Review submitted successfully");
    window.location.href = "profile.html";
  }else{
    alert(result.message || "Review save failed");
  }
}
</script>

</body>
</html>
