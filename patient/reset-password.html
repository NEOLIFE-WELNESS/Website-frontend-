<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password - Neolife Wellness Center</title>

<link rel="icon" href="../assets/main_logo.jpeg">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

:root{
  --green-dark:#123524;
  --green:#2f6b3f;
  --gold:#d4af37;
  --gold-dark:#9a7100;
  --cream:#f8f4e8;
  --text:#203329;
  --muted:#6d7971;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI",sans-serif;
}

body{
  min-height:100vh;
  background:
    linear-gradient(rgba(13,40,27,.65),rgba(13,40,27,.70)),
    url("../assets/neolife2.png") center/cover no-repeat fixed;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:120px 20px 30px;
}

/* Header */

.auth-header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:82px;
  padding:0 6%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(13,40,27,.45);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.15);
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
  text-decoration:none;
  color:white;
}

.brand img{
  width:52px;
  height:52px;
  border-radius:50%;
  border:2px solid var(--gold);
}

.brand strong{
  display:block;
  font-size:18px;
}

.brand span{
  color:#f1d878;
  font-size:11px;
  font-weight:800;
  letter-spacing:1px;
}

.auth-nav{
  display:flex;
  gap:28px;
}

.auth-nav a{
  text-decoration:none;
  color:white;
  font-weight:800;
  font-size:14px;
}

.auth-nav a:hover{
  color:#f1d878;
}

.nav-btn{
  border:1px solid rgba(255,255,255,.8);
  padding:10px 20px;
  border-radius:10px;
}

/* Card */

.auth-card{
  width:100%;
  max-width:460px;
  padding:38px;
  background:rgba(248,244,232,.88);
  border-radius:28px;
  backdrop-filter:blur(24px);
  position:relative;
  overflow:hidden;
  box-shadow:0 25px 60px rgba(0,0,0,.35);
}

.auth-card::before{
  content:"";
  position:absolute;
  width:220px;
  height:220px;
  border-radius:50%;
  top:-100px;
  right:-100px;
  background:rgba(212,175,55,.14);
}

.auth-card::after{
  content:"";
  position:absolute;
  width:180px;
  height:180px;
  border-radius:50%;
  bottom:-80px;
  left:-80px;
  background:rgba(47,107,63,.10);
}

.content{
  position:relative;
  z-index:2;
  text-align:center;
}

.close-btn{
  position:absolute;
  top:18px;
  right:18px;
  width:36px;
  height:36px;
  border-radius:50%;
  background:var(--green-dark);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
}

.logo{
  width:82px;
  height:82px;
  border-radius:50%;
  border:3px solid var(--gold);
  background:white;
  margin-bottom:18px;
}

h1{
  color:var(--green-dark);
  font-size:32px;
  margin-bottom:10px;
}

p{
  color:var(--muted);
  font-size:15px;
  margin-bottom:22px;
  line-height:1.7;
}

.field{
  position:relative;
  margin-bottom:18px;
}

.field i{
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  color:var(--gold-dark);
}

input{
  width:100%;
  height:54px;
  padding:0 16px 0 46px;
  border:none;
  border-bottom:2px solid rgba(18,53,36,.4);
  background:rgba(255,255,255,.6);
  border-radius:10px 10px 0 0;
  outline:none;
  font-size:15px;
}

input:focus{
  border-bottom-color:var(--gold-dark);
  background:white;
}

button{
  width:100%;
  height:54px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,var(--green-dark),var(--green));
  color:white;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  transform:translateY(-3px);
}

.note{
  margin-top:16px;
  padding:12px;
  border-radius:12px;
  background:rgba(223,234,221,.7);
  color:var(--muted);
  font-size:12px;
}

.link{
  margin-top:20px;
  font-size:14px;
}

.link a{
  color:var(--green-dark);
  font-weight:800;
  text-decoration:none;
}

@media(max-width:700px){

  .auth-nav a:not(.nav-btn){
    display:none;
  }

  .auth-card{
    padding:30px 22px;
  }

  h1{
    font-size:28px;
  }

}
@media(max-width:1100px) and (min-width:701px){

  .home-glass-header{
    padding:8px 18px !important;
    column-gap:12px !important;
  }

  .home-logo-img{
    width:46px !important;
    height:46px !important;
  }

  .home-logo-text{
    font-size:15px !important;
  }

  .home-logo-subtitle{
    font-size:9px !important;
  }

  .home-header-right{
    gap:9px !important;
  }

  .home-navbar{
    gap:11px !important;
  }

  .home-navbar > a,
  .home-category-btn{
    font-size:11px !important;
    padding:6px 0 !important;
  }

  .home-login-btn,
  .home-register-btn,
  .logout-btn{
    min-height:37px !important;
    padding:7px 11px !important;
    font-size:11px !important;
  }

  .profile-icon{
    width:38px !important;
    height:38px !important;
    min-width:38px !important;
  }
}
</style>
</head>

<body>

<header class="auth-header">

  <a href="homepage.html" class="brand">
    <img src="../assets/main_logo.jpeg">

    <div>
      <strong>Neolife Wellness Center</strong>
      <span>Ayush Digital Care</span>
    </div>
  </a>

  <nav class="auth-nav">
    <a href="homepage.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Therapies</a>
    <a href="contact.html">Contact</a>
    <a href="login.html" class="nav-btn">Login</a>
  </nav>

</header>

<div class="auth-card">

  <a href="login.html" class="close-btn">
    <i class="fa-solid fa-xmark"></i>
  </a>

  <div class="content">

    <img src="../assets/main_logo.jpeg" class="logo">

    <h1>Create New Password</h1>

    <p>Enter your new password and confirm it to secure your Neolife account.</p>

    <div class="field">
      <i class="fa-solid fa-lock"></i>
      <input type="password"
             id="newPassword"
             placeholder="New Password">
    </div>

    <div class="field">
      <i class="fa-solid fa-shield-halved"></i>
      <input type="password"
             id="confirmPassword"
             placeholder="Confirm Password">
    </div>

    <button onclick="resetPassword()">
      Reset Password
    </button>

    <div class="note">
      Your password should contain at least 6 characters.
    </div>

    <div class="link">
      Remember password?
      <a href="login.html">Login here</a>
    </div>

  </div>

</div>

<script>
const API_BASE_URL = "http://localhost:8085";

async function resetPassword(){

  const newPassword =
    document.getElementById("newPassword").value.trim();

  const confirmPassword =
    document.getElementById("confirmPassword").value.trim();

  const resetToken = localStorage.getItem("resetToken");

  if(!resetToken){
    alert("Reset token not found. Please try forgot password again.");
    window.location.href = "forgot-password.html";
    return;
  }

  if(newPassword === "" || confirmPassword === ""){
    alert("Please fill both password fields");
    return;
  }

  if(newPassword.length < 6){
    alert("Password must be at least 6 characters");
    return;
  }

  if(newPassword !== confirmPassword){
    alert("Passwords do not match");
    return;
  }

  try{

    const response = await fetch(
      `${API_BASE_URL}/api/auth/reset-password`,
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          resetToken:resetToken,
          newPassword:newPassword,
          confirmPassword:confirmPassword
        })
      }
    );

    const result = await response.json();

    if(result.success === true){

      localStorage.removeItem("resetToken");
      localStorage.removeItem("resetEmail");

      alert("Password reset successfully. Please login.");

      window.location.href = "login.html";

    }else{

      alert(result.message || "Password reset failed");

    }

  }catch(error){

    alert(
      "Backend not connected. Start Spring Boot backend on port 8085."
    );

    console.log(error);
  }
}
</script>

</body>
</html>
