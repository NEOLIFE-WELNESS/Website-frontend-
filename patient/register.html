<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Patient Register - Neolife Wellness Center</title>

  <link rel="icon" type="image/jpeg" href="../assets/main_logo.jpeg">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    :root{
      --green-950:#0d281b;
      --green-900:#123524;
      --green-700:#2f6b3f;
      --green-500:#5c8b61;
      --sage:#dfeadd;
      --cream:#f8f4e8;
      --gold:#d4af37;
      --gold-dark:#9a7100;
      --white:#ffffff;
      --text:#203329;
      --muted:#6d7971;
      --shadow:0 26px 70px rgba(13,40,27,.28);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:"Segoe UI", Arial, sans-serif;
    }

    body{
      min-height:100vh;
      color:var(--text);
      background:
        linear-gradient(rgba(13,40,27,.64),rgba(13,40,27,.68)),
        url("../assets/neolife2.png") center/cover no-repeat fixed;
      position:relative;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 20% 18%,rgba(212,175,55,.18),transparent 28%),
        radial-gradient(circle at 82% 74%,rgba(255,255,255,.10),transparent 30%);
      pointer-events:none;
    }

    /* Top navigation */
    .register-header{
      position:fixed;
      top:0;
      left:0;
      right:0;
      height:82px;
      padding:0 6%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:30px;
      z-index:1000;
      background:rgba(13,40,27,.44);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.12);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      color:white;
      text-decoration:none;
      flex-shrink:0;
    }

    .brand img{
      width:52px;
      height:52px;
      object-fit:cover;
      border-radius:50%;
      border:2px solid var(--gold);
    }

    .brand strong{
      display:block;
      font-size:18px;
      line-height:1.1;
    }

    .brand span{
      display:block;
      margin-top:4px;
      color:#f1d878;
      font-size:11px;
      font-weight:800;
      letter-spacing:1.2px;
      text-transform:uppercase;
    }

    .register-nav{
      display:flex;
      align-items:center;
      gap:28px;
    }

    .register-nav a{
      color:white;
      text-decoration:none;
      font-size:14px;
      font-weight:800;
    }

    .register-nav a:hover{
      color:#f1d878;
    }

    .nav-register{
      padding:10px 20px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.75);
    }

    /* Page */
    .register-page{
      min-height:100vh;
      padding:118px 20px 40px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .register-shell{
      width:min(760px,100%);
      position:relative;
    }

    .register-card{
      width:100%;
      padding:38px 40px 34px;
      border-radius:28px;
      background:rgba(248,244,232,.84);
      backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,.62);
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .register-card::before{
      content:"";
      position:absolute;
      width:260px;
      height:260px;
      right:-105px;
      top:-105px;
      border-radius:50%;
      background:rgba(212,175,55,.13);
    }

    .register-card::after{
      content:"";
      position:absolute;
      width:190px;
      height:190px;
      left:-90px;
      bottom:-95px;
      border-radius:50%;
      background:rgba(47,107,63,.10);
    }

    .close-button{
      position:absolute;
      top:16px;
      right:16px;
      width:36px;
      height:36px;
      display:grid;
      place-items:center;
      border-radius:50%;
      color:white;
      background:var(--green-900);
      text-decoration:none;
      z-index:3;
      box-shadow:0 8px 18px rgba(13,40,27,.18);
    }

    .register-content{
      position:relative;
      z-index:2;
    }

    .auth-logo{
      width:78px;
      height:78px;
      object-fit:cover;
      border-radius:50%;
      border:3px solid var(--gold);
      display:block;
      margin:0 auto 14px;
      background:white;
      box-shadow:0 10px 24px rgba(13,40,27,.18);
    }

    .register-card h2{
      text-align:center;
      color:var(--green-900);
      font-size:32px;
      line-height:1.15;
      margin-bottom:7px;
    }

    .register-card > .register-content > p{
      text-align:center;
      color:var(--muted);
      font-size:14px;
      margin-bottom:24px;
    }

    .form-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .form-group{
      margin-bottom:14px;
    }

    .form-group input,
    .form-group select{
      width:100%;
      height:52px;
      padding:0 16px;
      border:none;
      border-bottom:2px solid rgba(13,40,27,.46);
      border-radius:10px 10px 0 0;
      outline:none;
      background:rgba(255,255,255,.55);
      color:var(--text);
      font-size:15px;
      transition:.25s;
    }

    .form-group input::placeholder{
      color:#7f8a83;
    }

    .form-group select{
      cursor:pointer;
    }

    .form-group input:focus,
    .form-group select:focus{
      background:rgba(255,255,255,.9);
      border-bottom-color:var(--gold-dark);
      box-shadow:0 8px 18px rgba(13,40,27,.06);
    }

    .register-btn{
      width:100%;
      height:52px;
      margin-top:5px;
      border:none;
      border-radius:10px;
      color:white;
      background:linear-gradient(135deg,var(--green-900),var(--green-700));
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      transition:.3s;
      box-shadow:0 10px 24px rgba(13,40,27,.20);
    }

    .register-btn:hover{
      transform:translateY(-3px);
      background:linear-gradient(135deg,var(--gold),var(--gold-dark));
    }

    .auth-link{
      margin-top:20px !important;
      text-align:center;
      color:var(--muted) !important;
      font-size:14px !important;
    }

    .auth-link a{
      color:var(--green-900);
      font-weight:900;
      text-decoration:none;
    }

    .auth-link a:hover{
      color:var(--gold-dark);
    }

    .form-note{
      display:flex;
      align-items:center;
      gap:8px;
      margin:4px 0 18px;
      color:var(--muted);
      font-size:12px;
    }

    .form-note i{
      color:var(--gold-dark);
    }

    @media(max-width:780px){
      .register-header{
        padding:0 20px;
      }

      .register-nav{
        gap:15px;
      }

      .register-nav a:not(.nav-register){
        display:none;
      }
    }

    @media(max-width:620px){
      .register-page{
        padding:105px 12px 22px;
      }

      .register-card{
        padding:34px 22px 28px;
        border-radius:22px;
      }

      .form-row{
        grid-template-columns:1fr;
        gap:0;
      }

      .register-card h2{
        font-size:28px;
      }
    }
  </style>
</head>

<body>

<header class="register-header">

  <a href="homepage.html" class="brand">
    <img src="../assets/main_logo.jpeg" alt="Neolife Logo">

    <div>
      <strong>Neolife Wellness Center</strong>
      <span>Ayush Digital Care</span>
    </div>
  </a>

  <nav class="register-nav">
    <a href="homepage.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Therapies</a>
    <a href="beauty-cosmetics.html">Beauty</a>
    <a href="contact.html">Contact</a>
    <a href="register.html" class="nav-register">Register</a>
  </nav>

</header>

<main class="register-page">

  <div class="register-shell">

    <div class="register-card">

      <a href="homepage.html" class="close-button" aria-label="Close">
        <i class="fa-solid fa-xmark"></i>
      </a>

      <div class="register-content">

        <img src="../assets/main_logo.jpeg"
             class="auth-logo"
             alt="Neolife Logo">

        <h2>Patient Registration</h2>

        <p>Create your account to access consultations and wellness services.</p>

        <form id="registerForm" onsubmit="return registerUser(event)">

          <div class="form-group">
            <input type="text"
                   id="name"
                   placeholder="Full Name"
                   required>
          </div>

          <div class="form-row">

            <div class="form-group">
              <input type="tel"
                     id="phoneNumber"
                     placeholder="Phone Number"
                     maxlength="10"
                     oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                     required>
            </div>

            <div class="form-group">
              <input type="email"
                     id="email"
                     placeholder="Email Address"
                     required>
            </div>

          </div>

          <div class="form-row">

            <div class="form-group">
              <input type="number"
                     id="age"
                     placeholder="Age"
                     min="1"
                     max="120"
                     required>
            </div>

            <div class="form-group">
              <select id="gender" required>
                <option value="">Select Gender</option>
                <option value="MALE">Male</option>
                <option value="FEMALE">Female</option>
                <option value="OTHER">Other</option>
              </select>
            </div>

          </div>

          <div class="form-group">
            <input type="password"
                   id="password"
                   placeholder="Create Password"
                   required>
          </div>

          <div class="form-group">
            <input type="password"
                   id="confirmPassword"
                   placeholder="Confirm Password"
                   required>
          </div>

          <div class="form-note">
            <i class="fa-solid fa-shield-heart"></i>
            Your account information is used only for Neolife services.
          </div>

          <button type="submit" class="register-btn">
            Create Account
          </button>

        </form>

        <p class="auth-link">
          Already have an account?
          <a href="login.html">Login here</a>
        </p>

      </div>

    </div>

  </div>

</main>

<script>
const API_BASE_URL = "http://localhost:8085";

async function registerUser(event){
  event.preventDefault();

  const name = document.getElementById("name").value.trim();
  const phoneNumber = document.getElementById("phoneNumber").value.trim();
  const email = document.getElementById("email").value.trim();
  const age = document.getElementById("age").value.trim();
  const gender = document.getElementById("gender").value;
  const password = document.getElementById("password").value.trim();
  const confirmPassword =
    document.getElementById("confirmPassword").value.trim();

  if(
    !name ||
    !phoneNumber ||
    !email ||
    !age ||
    !gender ||
    !password ||
    !confirmPassword
  ){
    alert("Please fill all fields");
    return false;
  }

  if(phoneNumber.length !== 10){
    alert("Phone number must be 10 digits");
    return false;
  }

  if(password !== confirmPassword){
    alert("Password and confirm password do not match");
    return false;
  }

  try{
    const response = await fetch(
      `${API_BASE_URL}/api/auth/register`,
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          name:name,
          phoneNumber:phoneNumber,
          email:email,
          age:Number(age),
          gender:gender,
          password:password,
          confirmPassword:confirmPassword
        })
      }
    );

    const result = await response.json();

    if(result.success === true){
      alert("Registration successful. Please login.");
      window.location.href = "login.html";
    }else{
      alert(result.message || "Registration failed");
    }

  }catch(error){
    alert(
      "Backend not connected. Start Spring Boot backend on port 8085."
    );

    console.error(error);
  }

  return false;
}
</script>

</body>
</html>
