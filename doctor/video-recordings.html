<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Video Recordings</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="../css/doctor.css">

    <style>

        body{
            margin:0;
            background:#f5f7f4;
            font-family:Arial,sans-serif;
        }

        .main-content{
            margin-left:280px;
            padding:30px;
        }

        .page-header{
            background:linear-gradient(135deg,#123524,#2f6b3f);
            color:white;
            padding:30px;
            border-radius:20px;
            margin-bottom:25px;
        }

        .page-header h1{
            margin:0 0 10px;
        }

        .filters{
            display:grid;
            grid-template-columns:2fr 1fr 1fr;
            gap:15px;
            margin-bottom:25px;
        }

        .filters input,
        .filters select{
            padding:14px;
            border-radius:10px;
            border:1px solid #ddd;
        }

        .recordings-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
            gap:20px;
        }

        .record-card{
            background:white;
            border-radius:18px;
            overflow:hidden;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);
        }

        .thumbnail{
            height:190px;
            background:#d9d9d9;
            position:relative;
        }

        .play-btn{
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            width:70px;
            height:70px;
            border-radius:50%;
            border:none;
            background:white;
            cursor:pointer;
        }

        .play-btn i{
            font-size:24px;
            color:#123524;
        }

        .record-body{
            padding:20px;
        }

        .record-body h3{
            margin:0 0 10px;
            color:#123524;
        }

        .meta{
            color:#666;
            font-size:14px;
            margin-bottom:10px;
        }

        .actions{
            display:flex;
            gap:10px;
            margin-top:15px;
        }

        .actions button{
            flex:1;
            padding:12px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-weight:600;
        }

        .view-btn{
            background:#123524;
            color:white;
        }

        .download-btn{
            background:#d4af37;
            color:white;
        }

        @media(max-width:900px){

            .main-content{
                margin-left:0;
            }

            .filters{
                grid-template-columns:1fr;
            }
        }

    </style>

</head>

<body>

    <!-- Include your doctor sidebar here -->

    <div class="main-content">

        <div class="page-header">

            <h1>
                Video Recordings
            </h1>

            <p>
                Search and manage online consultation recordings.
            </p>

        </div>

        <div class="filters">

            <input type="text"
                   id="searchInput"
                   placeholder="Search patient name...">

            <input type="date"
                   id="dateFilter">

            <select id="doctorFilter">

                <option value="">
                    All Doctors
                </option>

                <option>
                    Dr. Muraleedhara
                </option>

            </select>

        </div>

        <div class="recordings-grid"
             id="recordingsGrid">

        </div>

    </div>

<script>

const recordings = [

    {
        id: 1,
        patientName: "Nisha",
        doctor: "Dr. Muraleedhara",
        date: "2026-07-14",
        duration: "20 mins",
        thumbnail:
            "../assets/video-placeholder.jpg",
        videoUrl:
            "../videos/sample1.mp4"
    },

    {
        id: 2,
        patientName: "Raghavendra",
        doctor: "Dr. Muraleedhara",
        date: "2026-07-12",
        duration: "18 mins",
        thumbnail:
            "../assets/video-placeholder.jpg",
        videoUrl:
            "../videos/sample2.mp4"
    }

];

const grid =
    document.getElementById(
        "recordingsGrid"
    );

function loadRecordings() {

    grid.innerHTML = "";

    recordings.forEach(record => {

        grid.innerHTML += `

            <div class="record-card">

                <div class="thumbnail">

                    <img
                        src="${record.thumbnail}"
                        style="
                            width:100%;
                            height:100%;
                            object-fit:cover;
                        "
                    >

                    <button
                        class="play-btn"
                        onclick="watchRecording(
                            '${record.videoUrl}'
                        )">

                        <i class="fa-solid fa-play"></i>

                    </button>

                </div>

                <div class="record-body">

                    <h3>
                        ${record.patientName}
                    </h3>

                    <div class="meta">
                        ${record.doctor}
                    </div>

                    <div class="meta">
                        ${record.date}
                    </div>

                    <div class="meta">
                        Duration:
                        ${record.duration}
                    </div>

                    <div class="actions">

                        <button
                            class="view-btn"
                            onclick="watchRecording(
                                '${record.videoUrl}'
                            )">

                            Watch

                        </button>

                        <button
                            class="download-btn"
                            onclick="downloadRecording(
                                '${record.videoUrl}'
                            )">

                            Download

                        </button>

                    </div>

                </div>

            </div>

        `;

    });

}

function watchRecording(url){

    window.open(
        url,
        "_blank"
    );

}

function downloadRecording(url){

    window.location.href = url;

}

loadRecordings();

</script>

</body>
</html>
