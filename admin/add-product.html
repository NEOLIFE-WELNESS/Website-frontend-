<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Product - Neolife Admin</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f8f4;
}

header{
    background:#1b5e20;
    color:white;
    padding:18px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    font-size:24px;
}

.back-btn{
    background:white;
    color:#1b5e20;
    padding:10px 16px;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
}

.container{
    width:90%;
    max-width:900px;
    margin:35px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

.container h2{
    color:#1b5e20;
    margin-bottom:25px;
    text-align:center;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
}

.form-group input,
.form-group textarea,
.form-group select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:7px;
    font-size:15px;
}

.form-group textarea{
    height:100px;
    resize:none;
}

.form-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.save-btn{
    width:100%;
    background:#1b5e20;
    color:white;
    border:none;
    padding:14px;
    border-radius:7px;
    font-size:17px;
    cursor:pointer;
    margin-top:10px;
}

.save-btn:hover{
    background:#2e7d32;
}

.message{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
}

#imagePreview{
    display:none;
    width:200px;
    height:200px;
    object-fit:cover;
    border-radius:10px;
    border:1px solid #ddd;
}

@media(max-width:768px){
    .form-row{
        grid-template-columns:1fr;
    }
}
#imagePreviewBox{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:10px;
}

.preview-img{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:10px;
  border:1px solid #ddd;
}
#uploadedImagesBox{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:15px;
}

.image-select-card{
  border:1px solid #ddd;
  border-radius:10px;
  padding:8px;
  text-align:center;
  background:white;
}

.image-select-card img{
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:8px;
}

.image-select-card input{
  margin-top:8px;
}
</style>
</head>

<body>

<header>
    <h1>Add Product</h1>
    <a href="admin-products.html" class="back-btn">Back</a>
</header>

<div class="container">

    <h2>Add New Product</h2>

    <form id="productForm">

        <div class="form-group">
            <label>Product Code</label>
            <input
                type="text"
                id="productNo"
                placeholder="Example: PROD001"
                required>
        </div>

        <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="productName" required>
        </div>

        <div class="form-group">
            <label>Product Description</label>
            <textarea id="description" required></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Price ₹</label>
                <input type="number" id="price" min="1" required>
            </div>

            <div class="form-group">
                <label>Total Stock</label>
                <input
                    type="number"
                    id="stock"
                    min="0"
                    placeholder="Example: 100"
                    required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Net Quantity</label>
                <input
                    type="text"
                    id="netQty"
                    placeholder="Example: 200 ml / 100 gm"
                    required>
            </div>

            <div class="form-group">
                <label>Expiry Date</label>
                <input type="month" id="expiryDate" required>
            </div>
        </div>

        <div class="form-group">
            <label>Indication</label>
            <input
                type="text"
                id="indication"
                placeholder="Example: Hair fall, Joint pain"
                required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Product Category</label>
                <select id="category" required>
                    <option value="">Select Category</option>
                    <option value="Hair Care">Hair Care</option>
                    <option value="Joint Care">Joint Care</option>
                    <option value="Diabetes Care">Diabetes Care</option>
                    <option value="Liver Care">Liver Care</option>
                    <option value="Pain Relief">Pain Relief</option>
                    <option value="Kashayam">Kashayam</option>
                    <option value="Kidney Care">Kidney Care</option>
                </select>
            </div>

            <div class="form-group">
                <label>Manufacturer</label>
                <select id="manufacturer" required>
  <option value="">Select Manufacturer</option>
</select>
            </div>
        </div>

        <div class="form-group">
  <label>Select Product Images</label>
  <div id="uploadedImagesBox"></div>
</div>

        <div class="form-group">
           <div id="imagePreviewBox"></div>
        </div>

        <button type="submit" class="save-btn">
            Save Product
        </button>

        <p class="message" id="message"></p>

    </form>

</div>

<script>
const API_BASE_URL = "http://localhost:8085";
let selectedImageUrls = [];

window.onload = function(){
  loadManufacturers();
  loadProductImages();
};

async function loadProductImages(){
  const token = localStorage.getItem("token");
  const box = document.getElementById("uploadedImagesBox");

  try{
    const response = await fetch(`${API_BASE_URL}/api/images/module/PRODUCT`, {
      method: "GET",
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const text = await response.text();

    if(!response.ok){
      box.innerHTML = `<p style="color:red;">Unable to load product images. Status: ${response.status}</p>`;
      console.log(text);
      return;
    }

    const result = JSON.parse(text);

    box.innerHTML = "";

    if(!result.success || !result.data || result.data.length === 0){
      box.innerHTML = "<p>No product images uploaded.</p>";
      return;
    }

    result.data.forEach(img => {
      const fullUrl = API_BASE_URL + img.fileUrl;

      box.innerHTML += `
        <label class="image-select-card">
          <img src="${fullUrl}">
          <input type="checkbox" value="${img.fileUrl}" onchange="toggleImageSelection(this)">
        </label>
      `;
    });

  }catch(error){
    console.log(error);
    box.innerHTML = `<p style="color:red;">Error loading images</p>`;
  }
}

function toggleImageSelection(checkbox){
  if(checkbox.checked){
    selectedImageUrls.push(checkbox.value);
  }else{
    selectedImageUrls = selectedImageUrls.filter(url => url !== checkbox.value);
  }
}

document.getElementById("productForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const token = localStorage.getItem("token");

  if(!token){
    alert("Please login as admin first");
    window.location.href = "../pages/login.html";
    return;
  }

  if(selectedImageUrls.length === 0){
    alert("Please select at least one product image");
    return;
  }

  const product = {
    productName: document.getElementById("productName").value.trim(),
    category: document.getElementById("category").value,
    productCode: document.getElementById("productNo").value.trim(),
    description: document.getElementById("description").value.trim(),
    price: Number(document.getElementById("price").value),
    stock: Number(document.getElementById("stock").value),
    netQty: document.getElementById("netQty").value.trim(),
    indication: document.getElementById("indication").value.trim(),
    manufacturerName: document.getElementById("manufacturer").value,
    manufacturingDate: new Date().toISOString().split("T")[0],
    expiryDate: document.getElementById("expiryDate").value + "-01",
    imageUrls: selectedImageUrls.join(",")
  };

  try{
    const response = await fetch(`${API_BASE_URL}/api/products/add`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify(product)
    });

    const result = await response.json();

    if(result.success){
      alert("Product created successfully");
      window.location.href = "admin-products.html";
    }else{
      alert(result.message || "Failed to add product");
    }

  }catch(error){
    console.log(error);
    alert("Backend not connected or admin token invalid");
  }
});

async function loadManufacturers(){
  const token = localStorage.getItem("token");

  try{
    const response = await fetch(`${API_BASE_URL}/api/manufacturers/getAll`, {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const result = await response.json();

    if(result.success){
      const manufacturerSelect = document.getElementById("manufacturer");
      manufacturerSelect.innerHTML = `<option value="">Select Manufacturer</option>`;

      result.data.forEach(item => {
        manufacturerSelect.innerHTML += `
          <option value="${item.name}">${item.name}</option>
        `;
      });
    }
  }catch(error){
    console.log(error);
  }
}
</script>
</body>
</html>
