<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Orders - Neolife Admin</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f8f4;
}

header{
    background:#1b5e20;
    color:white;
    padding:18px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.back-btn{
    background:white;
    color:#1b5e20;
    padding:10px 16px;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
}

.container{
    width:95%;
    margin:30px auto;
}

.top-box{
    background:white;
    padding:22px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    margin-bottom:25px;
}

.top-box h2{
    color:#1b5e20;
    margin-bottom:8px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

th{
    background:#2e7d32;
    color:white;
    padding:14px;
}

td{
    padding:13px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

.status{
    padding:6px 10px;
    border-radius:20px;
    font-size:13px;
    font-weight:bold;
}

.pending{
    background:#fff3cd;
    color:#856404;
}

.confirmed{
    background:#d4edda;
    color:#155724;
}

.shipped{
    background:#cce5ff;
    color:#004085;
}

.delivered{
    background:#d1ecf1;
    color:#0c5460;
}

.cancelled{
    background:#f8d7da;
    color:#721c24;
}

select{
    padding:8px;
    border-radius:6px;
    border:1px solid #ccc;
}

.view-btn{
    background:#1976d2;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
}

.view-btn:hover{
    background:#1565c0;
}

@media(max-width:900px){
    table{
        font-size:13px;
    }

    th,td{
        padding:8px;
    }
}
.modal{
    display:none;
    position:fixed;
    z-index:999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45);
}

.modal-content{
    background:white;
    width:420px;
    margin:120px auto;
    padding:25px;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.25);
}

.modal-content h2{
    color:#1b5e20;
    margin-bottom:18px;
    text-align:center;
}

.modal-content p{
    margin:10px 0;
    font-size:15px;
}

.close-btn{
    float:right;
    font-size:26px;
    cursor:pointer;
    color:#d32f2f;
}
</style>
</head>

<body>

<header>
    <h1>Manage Orders</h1>
    <a href="admin-dashboard.html" class="back-btn">Dashboard</a>
</header>

<div class="container">

    <div class="top-box">
        <h2>Customer Orders</h2>
        <p>View customer product orders and update order status.</p>
    </div>

    <table>
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Phone</th>
                <th>Product</th>
                <th>Qty</th>
                <th>Total</th>
                <th>Payment</th>
                <th>Status</th>
                <th>Change Status</th>
                <th>Action</th>
            </tr>
        </thead>

       <tbody id="ordersTable"></tbody>
    </table>

</div>
<div id="orderModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>

        <h2>Order Details</h2>

        <p><b>Order ID:</b> <span id="mOrderId"></span></p>
        <p><b>Customer:</b> <span id="mCustomer"></span></p>
        <p><b>Phone:</b> <span id="mPhone"></span></p>
        <p><b>Product:</b> <span id="mProduct"></span></p>
        <p><b>Quantity:</b> <span id="mQty"></span></p>
        <p><b>Amount:</b> <span id="mTotal"></span></p>
        <p><b>Payment:</b> <span id="mPayment"></span></p>
        <p><b>Status:</b> <span id="mStatus"></span></p>
        <p><b>Address:</b> Udupi, Karnataka</p>
    </div>
</div>
<script>
const API_BASE_URL = "http://localhost:8085";
let allOrders = [];

window.onload = loadOrders;

async function loadOrders(){
  const token = localStorage.getItem("token");

  if(!token){
    alert("Please login as admin first");
    window.location.href = "login.html";
    return;
  }

  try{
    const response = await fetch(`${API_BASE_URL}/api/orders/getAll`, {
      method: "GET",
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const text = await response.text();
    console.log("ORDERS RAW RESPONSE:", text);

    if(!response.ok){
      alert("Failed to load orders. Status: " + response.status);
      return;
    }

    const result = JSON.parse(text);
    console.log("ADMIN ORDERS RESPONSE:", result);

    if(result.success){
      allOrders = (result.data || []).sort((a, b) => b.id - a.id);
      displayOrders(allOrders);
    }else{
      alert(result.message || "Failed to load orders");
    }

  }catch(error){
    console.log(error);
    alert("Backend not connected or token issue");
  }
}

function displayOrders(orders){
  const table = document.getElementById("ordersTable");
  table.innerHTML = "";

  if(!orders || orders.length === 0){
    table.innerHTML = `
      <tr>
        <td colspan="10">No orders found</td>
      </tr>
    `;
    return;
  }

  orders.forEach(order => {
    const firstItem = order.items && order.items.length > 0 ? order.items[0] : null;

    const productName = firstItem
      ? firstItem.productName
      : "-";

    const qty = firstItem
      ? firstItem.quantity
      : "-";

    const statusText = order.status || "PENDING";
    const statusClass = getStatusClass(statusText);

    table.innerHTML += `
      <tr>
        <td>#${order.orderNumber || order.id}</td>
        <td>User ${order.userId || "-"}</td>
        <td>-</td>
        <td>${productName}</td>
        <td>${qty}</td>
        <td>₹${order.totalAmount || 0}</td>
        <td>COD / Pending</td>

        <td>
          <span class="status ${statusClass}">
            ${statusText}
          </span>
        </td>

        <td>
          <select onchange="changeStatus(this)" disabled>
            <option selected>${statusText}</option>
          </select>
        </td>

        <td>
          <button class="view-btn" onclick="viewOrder(${order.id})">View</button>
        </td>
      </tr>
    `;
  });
}

function getStatusClass(status){
  status = String(status || "").toLowerCase();

  if(status.includes("pending")) return "pending";
  if(status.includes("confirmed")) return "confirmed";
  if(status.includes("shipped")) return "shipped";
  if(status.includes("delivered")) return "delivered";
  if(status.includes("cancelled")) return "cancelled";

  return "pending";
}

function viewOrder(id){
  const order = allOrders.find(o => o.id === id);

  if(!order){
    alert("Order not found");
    return;
  }

  const items = order.items || [];

  const productText = items.length > 0
    ? items.map(item =>
        `${item.productName} (Qty: ${item.quantity}, ₹${item.subtotal})`
      ).join(", ")
    : "-";

  const qtyText = items.length > 0
    ? items.map(item => item.quantity).join(", ")
    : "-";

  document.getElementById("mOrderId").innerText = order.orderNumber || order.id;
  document.getElementById("mCustomer").innerText = "User " + (order.userId || "-");
  document.getElementById("mPhone").innerText = "-";
  document.getElementById("mProduct").innerText = productText;
  document.getElementById("mQty").innerText = qtyText;
  document.getElementById("mTotal").innerText = "₹" + (order.totalAmount || 0);
  document.getElementById("mPayment").innerText = order.status || "PENDING_PAYMENT";
  document.getElementById("mStatus").innerText = order.status || "-";

  document.querySelector("#orderModal .modal-content p:last-child").innerHTML =
    `<b>Address:</b> ${order.shippingAddress || "-"}`;

  document.getElementById("orderModal").style.display = "block";
}

function changeStatus(selectElement){
  alert("Status update API is not available yet.");
}

function closeModal(){
  document.getElementById("orderModal").style.display = "none";
}
</script>

</body>
</html>
