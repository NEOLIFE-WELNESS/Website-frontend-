<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Doctors - Neolife Admin</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f8f4;
}

header{
    background:#1b5e20;
    color:white;
    padding:18px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.back-btn{
    background:white;
    color:#1b5e20;
    text-decoration:none;
    padding:10px 15px;
    border-radius:6px;
    font-weight:bold;
}

.container{
    width:90%;
    margin:30px auto;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.add-btn{
    background:#1b5e20;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:6px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

th{
    background:#2e7d32;
    color:white;
    padding:14px;
}

td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

.doctor-img{
    width:60px;
    height:60px;
    border-radius:50%;
    object-fit:cover;
}

.edit-btn{
    background:#1976d2;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
}

.delete-btn{
    background:#d32f2f;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
}

.modal{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}

.modal-content{
    background:white;
    width:500px;
    max-width:90%;
    margin:50px auto;
    padding:25px;
    border-radius:12px;
}

.modal-content h2{
    margin-bottom:20px;
    color:#1b5e20;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

.form-group input,
.form-group textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

.save-btn{
    width:100%;
    background:#1b5e20;
    color:white;
    border:none;
    padding:12px;
    border-radius:6px;
    cursor:pointer;
}

.close-btn{
    float:right;
    font-size:25px;
    cursor:pointer;
}

</style>
</head>

<body>

<header>
    <h1>Manage Doctors</h1>
    <a href="admin-dashboard.html" class="back-btn">Dashboard</a>
</header>

<div class="container">

    <div class="top-bar">
        <h2>Doctor Profiles</h2>

        <button class="add-btn" onclick="openModal()">
            + Add Doctor
        </button>
    </div>

   <table>
  <thead>
    <tr>
      <th>Photo</th>
      <th>Name</th>
      <th>Qualification</th>
      <th>Specialization</th>
      <th>Experience</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody id="doctorTable"></tbody>
</table>

</div>

<!-- Add Doctor Modal -->

<div class="modal" id="doctorModal">

    <div class="modal-content">

        <span class="close-btn"
        onclick="closeModal()">&times;</span>

        <h2>Add Doctor</h2>

        <div class="form-group">
            <label>Doctor Name</label>
            <input type="text" id="doctorName">
        </div>

        <div class="form-group">
            <label>Qualification</label>
            <input type="text" id="qualification">
        </div>

        <div class="form-group">
            <label>Specialization</label>
            <input type="text" id="specialization">
        </div>

        <div class="form-group">
            <label>Experience</label>
            <input type="text" id="experience">
        </div>

        <!-- <div class="form-group">
            <label>Consultation Fee</label>
            <input type="text" id="fee">
        </div>

        <div class="form-group">
            <label>Doctor Photo</label>
            <input type="file">
        </div> -->
        <div class="form-group">
    <label>About</label>
    <textarea id="about"></textarea>
</div>

<div class="form-group">
    <label>Phone Number</label>
    <input type="text" id="phoneNumber">
</div>

<div class="form-group">
    <label>Email</label>
    <input type="email" id="doctorEmail">
</div>

<div class="form-group">
    <label>Image URL</label>
    <input type="text"
           id="imageUrl"
           placeholder="https://example.com/doctor.jpg">
</div>

        <button class="save-btn" onclick="saveDoctor()">
            Save Doctor
        </button>

    </div>

</div>
<div class="modal" id="editDoctorModal">

    <div class="modal-content">

        <span class="close-btn"
        onclick="closeEditModal()">&times;</span>

        <h2>Edit Doctor</h2>

        <input type="hidden" id="editRow">

        <div class="form-group">
            <label>Doctor Name</label>
            <input type="text" id="editName">
        </div>

        <div class="form-group">
            <label>Qualification</label>
            <input type="text" id="editQualification">
        </div>

        <div class="form-group">
            <label>Specialization</label>
            <input type="text" id="editSpecialization">
        </div>

        <div class="form-group">
            <label>Experience</label>
            <input type="text" id="editExperience">
        </div>
        <div class="form-group">
    <label>About</label>
    <textarea id="editAbout"></textarea>
</div>

        <!-- <div class="form-group">
            <label>Fee</label>
            <input type="text" id="editFee">
        </div> -->

        <button class="save-btn"
        onclick="updateDoctor()">
        Update Doctor
        </button>

    </div>

</div>
<script>

function openModal(){
    document.getElementById("doctorModal").style.display="block";
}

function closeModal(){
    document.getElementById("doctorModal").style.display="none";
}

const API_BASE_URL = "http://localhost:8085";
window.onload = function(){
    loadDoctors();
};

async function loadDoctors(){
    const token = localStorage.getItem("token");

    if(!token){
        alert("Please login as Admin.");
        window.location.href = "../frontend/login.html";
        return;
    }

    try{
        const response = await fetch(`${API_BASE_URL}/api/doctors/getAll`, {
            method: "GET",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if(!response.ok){
            alert("Access denied. Please login again as admin.");
            return;
        }

        const result = await response.json();

        if(result.success){
            displayDoctors(result.data);
        }else{
            alert(result.message || "Failed to load doctors");
        }

    }catch(error){
        console.error(error);
        alert(error.message);
    }
}

function displayDoctors(doctors){
    const table = document.getElementById("doctorTable");
    table.innerHTML = "";

    doctors.forEach(doctor => {
        table.innerHTML += `
            <tr>
                <td>
                    <img src="${doctor.imageUrl || 'https://via.placeholder.com/60'}" class="doctor-img">
                </td>
                <td>${doctor.name || "-"}</td>
                <td>${doctor.qualification || "-"}</td>
                <td>${doctor.specialization || "-"}</td>
                <td>${doctor.experience || "-"}</td>
                <td>${doctor.active ? "Active" : "Inactive"}</td>
               <td>
    <button class="edit-btn" onclick="editDoctor(${doctor.id})">
        Edit
    </button>

    <button class="delete-btn" onclick="deleteDoctor(${doctor.id})">
    Delete
</button>
</td>
            </tr>
        `;
    });
}
async function saveDoctor(){

    const token = localStorage.getItem("token");

    if(!token){
        alert("Please login as Admin.");
        return;
    }

    const doctor = {
        name: document.getElementById("doctorName").value.trim(),
        qualification: document.getElementById("qualification").value.trim(),
        specialization: document.getElementById("specialization").value.trim(),
        experience: document.getElementById("experience").value.trim(),
        about: document.getElementById("about").value.trim(),
        phoneNumber: document.getElementById("phoneNumber").value.trim(),
        email: document.getElementById("doctorEmail").value.trim(),
        imageUrl: document.getElementById("imageUrl").value.trim()
    };

    try{

        const response = await fetch(`${API_BASE_URL}/api/doctors/add`,{

            method:"POST",

            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + token
            },

            body:JSON.stringify(doctor)

        });

        const result = await response.json();

        if(result.success){

            alert(result.message);

            closeModal();

            document.getElementById("doctorModal").style.display = "none";
document.getElementById("doctorModal").querySelector("form")?.reset();
loadDoctors();

        }else{

            alert(result.message);

        }

    }catch(error){
  console.error(error);
  alert(error.message);
}

}
let currentRow = null;

async function editDoctor(id){

    const token = localStorage.getItem("token");

    try{

        const response = await fetch(`${API_BASE_URL}/api/doctors/${id}/get`,{

            headers:{
                "Authorization":"Bearer " + token
            }

        });

        const result = await response.json();

        if(result.success){

            const doctor = result.data;

            document.getElementById("editDoctorModal").style.display="block";

            currentRow = {
                dataset:{
                    id:id
                }
            };

            document.getElementById("editName").value = doctor.name;
            document.getElementById("editQualification").value = doctor.qualification;
            document.getElementById("editSpecialization").value = doctor.specialization;
            document.getElementById("editExperience").value = doctor.experience;

            // Add this textarea to your modal
            document.getElementById("editAbout").value = doctor.about;

        }else{

            alert(result.message);

        }

    }catch(error){

        console.log(error);

    }

}

function closeEditModal(){
    document.getElementById("editDoctorModal").style.display="none";
}

async function updateDoctor(){

    const token = localStorage.getItem("token");

    if(!token){
        alert("Please login as Admin.");
        return;
    }

    const id = currentRow.dataset.id;

    const doctor = {

        experience: document.getElementById("editExperience").value.trim(),

        about: document.getElementById("editAbout").value.trim()

    };

    try{

        const response = await fetch(`${API_BASE_URL}/api/doctors/update/${id}`,{

            method:"PUT",

            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + token
            },

            body: JSON.stringify(doctor)

        });

        if(!response.ok){
            alert("Failed to update doctor.");
            return;
        }

        const result = await response.json();

        if(result.success){

            alert(result.message);

            closeEditModal();

            loadDoctors();

        }else{

            alert(result.message);

        }

    }catch(error){

        console.error(error);
        alert(error.message);

    }
}
async function deleteDoctor(id){

    const token = localStorage.getItem("token");

    if(!token){
        alert("Please login as Admin.");
        return;
    }

    const confirmDelete = confirm("Are you sure you want to delete this doctor?");

    if(!confirmDelete){
        return;
    }

    try{

        const response = await fetch(`${API_BASE_URL}/api/doctors/remove/${id}`,{

            method:"DELETE",

            headers:{
                "Authorization":"Bearer " + token
            }

        });

        if(!response.ok){
            alert("Failed to delete doctor.");
            return;
        }

        const result = await response.json();

        if(result.success){

            alert(result.message);

            loadDoctors();

        }else{

            alert(result.message);

        }

    }catch(error){

        console.error(error);
        alert(error.message);

    }
}
</script>

</body>
</html>
