<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinic Reviews - Neolife Admin</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f8f4}
header{background:#1b5e20;color:white;padding:18px 8%;display:flex;justify-content:space-between;align-items:center}
.back-btn{background:white;color:#1b5e20;padding:10px 16px;border-radius:6px;text-decoration:none;font-weight:bold}
.container{width:95%;margin:30px auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:25px}
.card{background:white;padding:22px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.08);text-align:center}
.card h3{color:#1b5e20;margin-bottom:8px}
.card p{font-size:26px;font-weight:bold}
.filter-box{background:white;padding:18px;border-radius:12px;margin-bottom:25px;box-shadow:0 5px 15px rgba(0,0,0,.08)}
.filter-box button{padding:10px 15px;margin:5px;border:none;border-radius:6px;cursor:pointer;background:#e8f5e9;color:#1b5e20;font-weight:bold}
.filter-box button:hover{background:#1b5e20;color:white}
.table-wrap{overflow-x:auto}
table{width:100%;min-width:1200px;border-collapse:collapse;background:white;box-shadow:0 5px 15px rgba(0,0,0,.08)}
th{background:#2e7d32;color:white;padding:14px}
td{padding:13px;border-bottom:1px solid #ddd;text-align:center}
.review-text{max-width:280px;text-align:left}
.rating{color:#f4b400;font-size:18px;font-weight:bold}
.status{padding:6px 12px;border-radius:20px;font-size:13px;font-weight:bold}
.pending{background:#fff3cd;color:#856404}
.approved{background:#d4edda;color:#155724}
.rejected{background:#f8d7da;color:#721c24}
select{padding:8px;border-radius:6px;border:1px solid #ccc}
.view-btn,.delete-btn{color:white;border:none;padding:8px 12px;border-radius:5px;cursor:pointer;margin:2px}
.view-btn{background:#1976d2}
.delete-btn{background:#d32f2f}
.no-result{text-align:center;color:#d32f2f;font-weight:bold;margin-top:20px;display:none}
</style>
</head>

<body>

<header>
  <h1>Manage Clinic Reviews</h1>
  <a href="admin-dashboard.html" class="back-btn">Dashboard</a>
</header>

<div class="container">

  <div class="cards">
    <div class="card"><h3>Total Clinic Reviews</h3><p id="totalCount">0</p></div>
    <div class="card"><h3>Approved</h3><p id="approvedCount">0</p></div>
    <div class="card"><h3>Pending</h3><p id="pendingCount">0</p></div>
    <div class="card"><h3>Rejected</h3><p id="rejectedCount">0</p></div>
  </div>

  <div class="filter-box">
    <button onclick="filterReviews('ALL')">All</button>
    <button onclick="filterReviews('PENDING')">Pending</button>
    <button onclick="filterReviews('APPROVED')">Approved</button>
    <button onclick="filterReviews('REJECTED')">Rejected</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Review ID</th>
          <th>Patient</th>
          <th>Doctor</th>
          <th>Therapy / Service</th>
          <th>Rating</th>
          <th>Review</th>
          <th>Date</th>
          <th>Status</th>
          <th>Change Status</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="reviewTable"></tbody>
    </table>
  </div>

  <p id="noResult" class="no-result">No reviews found.</p>

</div>

<script>
const API_BASE_URL = "http://localhost:8085";
let allReviews = [];

window.onload = function(){
  loadReviews();
};

function getToken(){
  return localStorage.getItem("token");
}

async function loadReviews(){
  try{
    const response = await fetch(`${API_BASE_URL}/api/clinic-reviews/getAll`);

    if(!response.ok){
      alert("Failed to load clinic reviews");
      return;
    }

    const result = await response.json();

    if(result.success){
      allReviews = result.data || [];
      displayReviews(allReviews);
      updateCards(allReviews);
    }else{
      alert(result.message || "Failed to load reviews");
    }

  }catch(error){
    console.error(error);
    alert(error.message);
  }
}

function displayReviews(reviews){
  const table = document.getElementById("reviewTable");
  table.innerHTML = "";

  if(!reviews || reviews.length === 0){
    document.getElementById("noResult").style.display = "block";
    return;
  }

  document.getElementById("noResult").style.display = "none";

  reviews.forEach(review => {
    const status = review.status || "PENDING";

    table.innerHTML += `
      <tr data-status="${status}">
        <td>${review.id}</td>
        <td>${review.patientName || "-"}</td>
        <td>${review.doctor || "-"}</td>
        <td>${review.therapyService || "-"}</td>
        <td class="rating">${getStars(review.rating)}</td>
        <td class="review-text">${review.message || "-"}</td>
        <td>${formatDate(review.createdAt)}</td>
        <td>
          <span class="status ${status.toLowerCase()}">${status}</span>
        </td>
        <td>
          <select onchange="updateReviewStatus(${review.id}, this.value)">
            <option value="PENDING" ${status === "PENDING" ? "selected" : ""}>Pending</option>
            <option value="APPROVED" ${status === "APPROVED" ? "selected" : ""}>Approved</option>
            <option value="REJECTED" ${status === "REJECTED" ? "selected" : ""}>Rejected</option>
          </select>
        </td>
        <td>
          <button class="view-btn" onclick="viewReview(${review.id})">View</button>
          <button class="delete-btn" onclick="deleteReview(${review.id})">Delete</button>
        </td>
      </tr>
    `;
  });
}

function updateCards(reviews){
  document.getElementById("totalCount").innerText = reviews.length;
  document.getElementById("approvedCount").innerText =
    reviews.filter(r => r.status === "APPROVED").length;
  document.getElementById("pendingCount").innerText =
    reviews.filter(r => r.status === "PENDING").length;
  document.getElementById("rejectedCount").innerText =
    reviews.filter(r => r.status === "REJECTED").length;
}

function filterReviews(status){
  if(status === "ALL"){
    displayReviews(allReviews);
    return;
  }

  const filtered = allReviews.filter(r => r.status === status);
  displayReviews(filtered);
}

async function viewReview(id){
  const token = getToken();

  if(!token){
    alert("Please login as admin first");
    return;
  }

  try{
    const response = await fetch(`${API_BASE_URL}/api/clinic-reviews/getById/${id}`, {
      method: "GET",
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    if(!response.ok){
      alert("Failed to fetch review details");
      return;
    }

    const result = await response.json();

    if(result.success){
      const r = result.data;

      alert(
        "Clinic Review Details\n\n" +
        "Review ID: " + r.id + "\n" +
        "Patient: " + (r.patientName || "-") + "\n" +
        "Doctor: " + (r.doctor || "-") + "\n" +
        "Therapy / Service: " + (r.therapyService || "-") + "\n" +
        "Rating: " + r.rating + "\n" +
        "Review: " + (r.message || "-") + "\n" +
        "Status: " + (r.status || "-") + "\n" +
        "Date: " + formatDate(r.createdAt)
      );

    }else{
      alert(result.message || "Review not found");
    }

  }catch(error){
    console.error(error);
    alert(error.message);
  }
}

async function updateReviewStatus(id, status){
  const token = getToken();

  if(!token){
    alert("Please login as admin first");
    return;
  }

  try{
    const response = await fetch(`${API_BASE_URL}/api/clinic-reviews/update-status/${id}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ status: status })
    });

    if(!response.ok){
      alert("Failed to update status");
      loadReviews();
      return;
    }

    const result = await response.json();

    if(result.success){
      alert(result.message);
      loadReviews();
    }else{
      alert(result.message || "Failed to update status");
      loadReviews();
    }

  }catch(error){
    console.error(error);
    alert(error.message);
    loadReviews();
  }
}

async function deleteReview(id){
  const token = getToken();

  if(!token){
    alert("Please login as admin first");
    return;
  }

  if(!confirm("Delete this clinic review?")){
    return;
  }

  try{
    const response = await fetch(`${API_BASE_URL}/api/clinic-reviews/delete/${id}`, {
      method: "DELETE",
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    if(!response.ok){
      alert("Failed to delete review");
      return;
    }

    const result = await response.json();

    if(result.success){
      alert(result.message);
      loadReviews();
    }else{
      alert(result.message || "Delete failed");
    }

  }catch(error){
    console.error(error);
    alert(error.message);
  }
}

function getStars(rating){
  let stars = "";
  for(let i = 1; i <= 5; i++){
    stars += i <= rating ? "★" : "☆";
  }
  return stars;
}

function formatDate(date){
  if(!date) return "-";
  return date.substring(0, 10);
}
</script>

</body>
</html>
