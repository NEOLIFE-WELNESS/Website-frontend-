<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Product - Neolife Admin</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f8f4;
}

header{
    background:#1b5e20;
    color:white;
    padding:18px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    font-size:24px;
}

.back-btn{
    background:white;
    color:#1b5e20;
    padding:10px 16px;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
}

.container{
    width:90%;
    max-width:900px;
    margin:35px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

.container h2{
    color:#1b5e20;
    margin-bottom:25px;
    text-align:center;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
}

.form-group input,
.form-group textarea,
.form-group select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:7px;
    font-size:15px;
}

.form-group textarea{
    height:100px;
    resize:none;
}

.form-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.current-img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:10px;
    border:1px solid #ddd;
    display:block;
    margin-top:10px;
}

.update-btn{
    width:100%;
    background:#1b5e20;
    color:white;
    border:none;
    padding:14px;
    border-radius:7px;
    font-size:17px;
    cursor:pointer;
    margin-top:10px;
}

.update-btn:hover{
    background:#2e7d32;
}

.message{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
}

@media(max-width:768px){
    .form-row{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<header>
    <h1>Edit Product</h1>
    <a href="admin-products.html" class="back-btn">Back</a>
</header>

<div class="container">

    <h2>Update Product Details</h2>

    <form id="editProductForm">

        <input type="hidden" id="productId">

        <div class="form-group">
            <label>Product Code</label>
            <input type="text" id="productNo" placeholder="Example: PROD001" required>
        </div>

        <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="name" required>
        </div>

        <div class="form-group">
            <label>Product Description</label>
            <textarea id="description" required></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Price ₹</label>
                <input type="number" id="price" min="1" required>
            </div>

            <div class="form-group">
                <label>Total Stock</label>
                <input type="number" id="stock" min="0" placeholder="Example: 100" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Net Quantity</label>
                <input type="text" id="netQty" placeholder="Example: 200 ml / 100 gm" required>
            </div>

            <div class="form-group">
                <label>Expiry Date</label>
                <input type="month" id="expiryDate" required>
            </div>
        </div>

        <div class="form-group">
            <label>Indication</label>
            <input type="text" id="indication" placeholder="Example: Hair fall, Joint pain" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Product Category</label>
                <select id="category" required>
                    <option value="">Select Category</option>
                    <option value="Hair Care">Hair Care</option>
                    <option value="Joint Care">Joint Care</option>
                    <option value="Diabetes Care">Diabetes Care</option>
                    <option value="Liver Care">Liver Care</option>
                    <option value="Pain Relief">Pain Relief</option>
                    <option value="Kashayam">Kashayam</option>
                    <option value="Kidney Care">Kidney Care</option>
                </select>
            </div>

            <div class="form-group">
                <label>Manufacturer</label>
                <select id="manufacturer" required>
  <option value="">Select Manufacturer</option>
</select>
            </div>
        </div>
  <div class="form-group">
    <label>Product Image URLs</label>

    <textarea
        id="imageUrls"
        placeholder="Enter one image URL per line"></textarea>
</div>

<div class="form-group">
    <div id="imagePreviewBox"></div>
</div>
        
        <div class="form-group">
            <label>Change Product Image</label>
            <input type="file" id="productImage" accept="image/*" onchange="previewImage(event)">
        </div>

        <button type="submit" class="update-btn">Update Product</button>

        <p class="message" id="message"></p>

    </form>

</div>

<script>
const API_BASE_URL = "http://localhost:8085";

window.onload = async function(){
  await loadManufacturers();
  await loadProduct();
  document.getElementById("imageUrls")
.addEventListener("input", previewImagesFromUrls);
};

function getProductId(){
  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}

async function loadManufacturers(){
  const token = localStorage.getItem("token");

  try{
    const response = await fetch(`${API_BASE_URL}/api/manufacturers/getAll`, {
      method: "GET",
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const result = await response.json();

    if(result.success){
      const select = document.getElementById("manufacturer");
      select.innerHTML = `<option value="">Select Manufacturer</option>`;

      result.data.forEach(item => {
        select.innerHTML += `
          <option value="${item.type}">
            ${item.name} (${item.type})
          </option>
        `;
      });
    }
  }catch(error){
    console.log(error);
  }
}

async function loadProduct(){
  const productId = getProductId();

  if(!productId){
    alert("Product ID missing");
    window.location.href = "admin-products.html";
    return;
  }

  try{
    const response = await fetch(`${API_BASE_URL}/api/products/${productId}`, {
      method: "GET"
    });

    const result = await response.json();

    if(result.success){
      const product = result.data;

      document.getElementById("productId").value = product.id;
      document.getElementById("productNo").value = product.productCode || "";
      document.getElementById("name").value = product.productName || product.name || "";
      document.getElementById("description").value = product.description || "";
      document.getElementById("price").value = product.price || "";
      document.getElementById("stock").value = product.stock || "";
      document.getElementById("netQty").value = product.netQty || "";
      document.getElementById("indication").value = product.indication || "";
      document.getElementById("category").value = product.category || "";

      if(product.manufacturer){
        document.getElementById("manufacturer").value = product.manufacturer;
      }

      if(product.expiryDate){
        document.getElementById("expiryDate").value = product.expiryDate.substring(0, 7);
      }

      if(product.imageUrls){

    }else{
      alert(result.message || "Product not found");
      window.location.href = "admin-products.html";
    }

  }catch(error){

  }
}
function previewImagesFromUrls(){

    const previewBox = document.getElementById("imagePreviewBox");

    previewBox.innerHTML = "";

    const urls = document.getElementById("imageUrls").value
        .split("\n")
        .map(x => x.trim())
        .filter(x => x !== "");

    urls.forEach(url=>{

        const img=document.createElement("img");

        img.src=url;

        img.className="preview-img";

        previewBox.appendChild(img);

    });

}


document.getElementById("editProductForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const token = localStorage.getItem("token");
  const productId = document.getElementById("productId").value;
  const imageFile = document.getElementById("productImage").files[0];

  if(!token){
    alert("Please login as admin first");
    window.location.href = "../frontend/login.html";
    return;
  }

  const updatedProduct = {
    productName: document.getElementById("name").value.trim(),
    category: document.getElementById("category").value,
    description: document.getElementById("description").value.trim(),
    price: Number(document.getElementById("price").value),
    stock: Number(document.getElementById("stock").value),
    productCode: document.getElementById("productNo").value.trim(),
    netQty: document.getElementById("netQty").value.trim(),
    indication: document.getElementById("indication").value.trim(),
    dosageForm: "Liquid",
    manufacturer: document.getElementById("manufacturer").value,
    expiryDate: document.getElementById("expiryDate").value + "-01",
    imageUrls: document.getElementById("imageUrls").value
    .split("\n")
    .map(url => url.trim())
    .filter(url => url !== "")
    .join(","),
    lowStockLimit: 5
  };

  try{
    const response = await fetch(`${API_BASE_URL}/api/products/${productId}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify(updatedProduct)
    });

    const result = await response.json();

    if(result.success){
      document.getElementById("message").style.color = "green";
      document.getElementById("message").innerText = "Product updated successfully!";

      setTimeout(() => {
        window.location.href = "admin-products.html";
      }, 1000);
    }else{
      document.getElementById("message").style.color = "red";
      document.getElementById("message").innerText = result.message || "Update failed";
    }

  }catch(error){
    console.log(error);
    document.getElementById("message").style.color = "red";
    document.getElementById("message").innerText = "Backend not connected or admin token invalid";
  }
});
</script>

</body>
</html>
