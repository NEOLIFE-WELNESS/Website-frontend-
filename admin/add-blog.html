<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Blog</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="icon" href="../assets/main_logo.jpeg">
<style>
  html,
body {
    margin: 0 !important;
    padding: 0 !important;
}

body {
    padding-top: 0 !important;
}

.add-blog-page {
    margin: 0 !important;
    padding: 25px 20px !important;
    align-items: flex-start !important;
}

</style>
</head>

<body>

<section class="add-blog-page">

<div class="blog-form-box">

<h1>Add New Blog</h1>

<!-- <form id="blogForm" onsubmit="saveBlog(event)">
     -->
<form id="blogForm">
<label>Blog Title</label>
<input type="text" id="title" placeholder="Enter title" required>

<label>Author Name</label>
<input type="text" id="author" placeholder="Doctor Name" required>

<label>Select Blog Image</label>
<div id="uploadedBlogImagesBox"></div>

<label>Full Blog Content</label>
<textarea id="content" rows="10" required></textarea>

<div class="blog-buttons">

    <button type="button"
            class="draft-btn"
            onclick="saveDraft()">
        Save as Draft
    </button>

    <button type="button"
            class="publish-btn"
            onclick="publishBlog()">
        Publish Blog
    </button>

</div>

</form>

</div>

</section>
<script>
const API_BASE_URL = "http://localhost:8085";
let selectedBlogImageUrl = "";

window.onload = function(){
  loadBlogImages();
};

async function loadBlogImages(){
  const token = localStorage.getItem("token");
  const box = document.getElementById("uploadedBlogImagesBox");

  try{
    const response = await fetch(`${API_BASE_URL}/api/images/module/BLOG`, {
      method: "GET",
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const text = await response.text();

    if(!response.ok){
      box.innerHTML = `<p style="color:red;">Unable to load blog images. Status: ${response.status}</p>`;
      return;
    }

    const result = JSON.parse(text);
    box.innerHTML = "";

    if(!result.success || !result.data || result.data.length === 0){
      box.innerHTML = "<p>No blog images uploaded.</p>";
      return;
    }

    result.data.forEach(img => {
      const fullUrl = API_BASE_URL + img.fileUrl;

      box.innerHTML += `
        <label class="image-select-card">
          <img src="${fullUrl}">
          <input type="radio" name="blogImage" value="${img.fileUrl}" onchange="selectBlogImage(this)">
        </label>
      `;
    });

  }catch(error){
    console.log(error);
    box.innerHTML = `<p style="color:red;">Error loading blog images</p>`;
  }
}

function selectBlogImage(radio){
  selectedBlogImageUrl = radio.value;
}

async function saveDraft(){
  const token = localStorage.getItem("token");

  if(!token){
    alert("Please login as admin first");
    window.location.href = "../frontend/login.html";
    return;
  }

  if(!selectedBlogImageUrl){
    alert("Please select one blog image");
    return;
  }

  const blog = {
    title: document.getElementById("title").value.trim(),
    content: document.getElementById("content").value.trim(),
    authorName: document.getElementById("author").value.trim(),
    imageUrl: selectedBlogImageUrl
  };

  try{
    const response = await fetch(`${API_BASE_URL}/api/blogs/add`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify(blog)
    });

    const result = await response.json();

    if(result.success){
      localStorage.setItem("blogId", result.data.id);
      alert(result.message || "Blog saved as draft");
    }else{
      alert(result.message || "Failed to save blog");
    }

  }catch(error){
    console.error(error);
    alert(error.message);
  }
}

async function publishBlog(){
  const token = localStorage.getItem("token");
  const blogId = localStorage.getItem("blogId");

  if(!token){
    alert("Please login as admin first");
    window.location.href = "../frontend/login.html";
    return;
  }

  if(!blogId){
    alert("Please save the blog as draft first.");
    return;
  }

  const response = await fetch(`${API_BASE_URL}/api/blogs/${blogId}/publish`, {
    method: "PUT",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const result = await response.json();

  if(result.success){
    alert(result.message || "Blog published successfully");
    localStorage.removeItem("blogId");
    window.location.href = "admin-blogs.html";
  }else{
    alert(result.message || "Failed to publish blog");
  }
}
</script>
</body>
</html>
