<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Blogs - Neolife Wellness Center</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="icon" href="../assets/main_logo.jpeg">

<style>
* {
    box-sizing: border-box;
}

html,
body {
    margin: 0 !important;
    padding: 0 !important;
}

body {
    min-height: 100vh;
    background: #fffaf1;
    font-family: Arial, sans-serif;
    padding-top: 0 !important;
}

/* Remove any global header spacing from style.css */
.admin-page {
    width: 95%;
    max-width: 1200px;
    margin: 25px auto !important;
    padding: 25px 30px;
    background: #ffffff;
    border-radius: 4px;
}

.admin-page h1 {
    color: #1b5e20;
    margin: 0 0 20px;
    font-size: 26px;
}

.add-btn {
    display: inline-block;
    background: #1b5e20;
    color: white;
    padding: 12px 20px;
    text-decoration: none;
    border-radius: 8px;
    margin-bottom: 20px;
}

.add-btn:hover {
    background: #124717;
}

.table-wrapper {
    width: 100%;
    overflow-x: auto;
}

.admin-table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
}

.admin-table th {
    background: #2e7d32;
    color: white;
    padding: 14px;
    text-align: center;
}

.admin-table td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
    text-align: center;
    vertical-align: middle;
}

.blog-thumb {
    width: 80px;
    height: 60px;
    object-fit: cover;
    border-radius: 6px;
    display: block;
    margin: auto;
}

.action-buttons {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
}

.edit-btn,
.publish-btn,
.delete-btn {
    border: none;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    color: white;
    text-decoration: none;
    font-size: 15px;
}

.edit-btn {
    background: #1976d2;
}

.publish-btn {
    background: #2e7d32;
}

.delete-btn {
    background: #d32f2f;
}

.edit-btn:hover {
    background: #125ca5;
}

.publish-btn:hover {
    background: #1b5e20;
}

.delete-btn:hover {
    background: #a82222;
}

.status {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 15px;
    color: white;
    font-size: 13px;
}

.draft {
    background: #ff9800;
}

.published {
    background: #2e7d32;
}

.empty-message {
    text-align: center;
    padding: 30px;
    color: #666;
}

@media (max-width: 768px) {
    .admin-page {
        width: 94%;
        margin: 15px auto !important;
        padding: 20px 15px;
    }

    .admin-page h1 {
        font-size: 23px;
    }

    .admin-table {
        min-width: 850px;
    }
}
</style>
</style>

</head>

<body>

<section class="admin-page">

<h1>Manage Blogs</h1>

<a href="add-blog.html" class="add-btn">
+ Add New Blog
</a>

<table class="admin-table">

<thead>

<tr>

<th>ID</th>
<th>Image</th>
<th>Title</th>
<th>Author</th>
<th>Status</th>
<th>Created</th>
<th>Action</th>

</tr>

</thead>

<tbody id="blogTable">

</tbody>

</table>

</section>

<script>

const API_BASE_URL="http://localhost:8085";

let blogs=[];

window.onload=function(){

    loadBlogs();

};

async function loadBlogs(){

    const token=localStorage.getItem("token");

    if(!token){

        alert("Please login as Admin");

        window.location.href="../frontend/login.html";

        return;

    }

    try{

        const response=await fetch(

            `${API_BASE_URL}/api/blogs/admin/all`,

            {

                method:"GET",

                headers:{

                    "Authorization":"Bearer "+token

                }

            }

        );

        const result=await response.json();

        if(result.success){

            blogs=result.data;

            displayBlogs(blogs);

        }

        else{

            alert(result.message);

        }

    }

    catch(error){

        console.error(error);

        alert("Backend not connected.");

    }

}

function displayBlogs(blogs){

    const table=document.getElementById("blogTable");

    table.innerHTML="";

    blogs.forEach(blog=>{

        let image="../assets/main_logo.jpeg";

        if(blog.imageUrl){

            if(blog.imageUrl.startsWith("http"))

                image=blog.imageUrl;

            else

                image=blog.imageUrl;

        }

        table.innerHTML+=`

        <tr>

        <td>${blog.id}</td>

        <td>

        <img src="${image}"

        class="blog-thumb">

        </td>

        <td>${blog.title}</td>

        <td>${blog.authorName || "-"}</td>

        <td>

        <span class="status ${blog.published?"published":"draft"}">

        ${blog.published?"Published":"Draft"}

        </span>

        </td>

        <td>${blog.createdAt.substring(0,10)}</td>

        <td>

        <div class="action-buttons">

        <a href="edit-blog.html?id=${blog.id}"

        class="edit-btn">

        Edit

        </a>

        ${
            !blog.published
            ?

            `<button class="publish-btn"

            onclick="publishBlog(${blog.id})">

            Publish

            </button>`

            :

            ""

        }

        <button

        class="delete-btn"

        onclick="deleteBlog(${blog.id})">

        Delete

        </button>

        </div>

        </td>

        </tr>

        `;

    });

}

async function publishBlog(id){

    const token=localStorage.getItem("token");

    if(!confirm("Publish this blog?")) return;

    try{

        const response=await fetch(

        `${API_BASE_URL}/api/blogs/${id}/publish`,

        {

            method:"PUT",

            headers:{

                "Authorization":"Bearer "+token

            }

        });

        const result=await response.json();

        alert(result.message);

        loadBlogs();

    }

    catch(error){

        console.error(error);

    }

}

async function deleteBlog(id){

    const token=localStorage.getItem("token");

    if(!confirm("Delete this blog?")) return;

    try{

        const response=await fetch(

        `${API_BASE_URL}/api/blogs/remove/${id}`,

        {

            method:"DELETE",

            headers:{

                "Authorization":"Bearer "+token

            }

        });

        const result=await response.json();

        alert(result.message);

        loadBlogs();

    }

    catch(error){

        console.error(error);

    }

}

</script>

</body>
</html>
