<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Blog - Neolife Wellness Center</title>

<link rel="icon" href="../assets/main_logo.jpeg">
<link rel="stylesheet" href="../css/style.css">
<style>
  html,
body {
    margin: 0 !important;
    padding: 0 !important;
}

body {
    padding-top: 0 !important;
}

.add-blog-page {
    margin: 0 !important;
    padding: 25px 20px !important;
    align-items: flex-start !important;
}
</style>
</head>

<body>

<section class="add-blog-page">

<div class="blog-form-box">

<h1>Edit Blog</h1>

<form id="editBlogForm">

<label>Blog Title</label>
<input type="text" id="title" required>

<label>Author Name</label>
<input type="text" id="authorName" placeholder="Doctor Name">

<label>Current Image</label>
<img id="currentImage" src="../assets/main_logo.jpeg" class="edit-blog-img">

<label>Image URL</label>
<input type="text" id="imageUrl" placeholder="https://example.com/blog.jpg">


<label>Full Blog Content</label>
<textarea id="content" rows="10" required></textarea>

<button type="button" class="save-btn" onclick="updateBlog()">
Update Blog
</button>

<a href="admin-blogs.html" class="back-btn">
Back to Blog List
</a>

</form>

</div>

</section>

<script>
const API_BASE_URL = "http://localhost:8085";

const params = new URLSearchParams(window.location.search);
const blogId = params.get("id");

window.onload = function(){
  loadBlog();
};

async function loadBlog(){
  const token = localStorage.getItem("token");

  if(!token){
    alert("Please login as Admin.");
    window.location.href = "../frontend/login.html";
    return;
  }

  if(!blogId){
    alert("Blog ID missing.");
    window.location.href = "admin-blogs.html";
    return;
  }

  try{
    const response = await fetch(`${API_BASE_URL}/api/blogs/${blogId}/get`, {
      method: "GET",
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    if(!response.ok){
      alert("Failed to load blog. Please login again as Admin.");
      return;
    }

    const result = await response.json();

    if(result.success){
      const blog = result.data;

      document.getElementById("title").value = blog.title || "";
      document.getElementById("authorName").value = blog.authorName || "";
      document.getElementById("imageUrl").value = blog.imageUrl || "";
      
      document.getElementById("content").value = blog.content || "";

      document.getElementById("currentImage").src =
        blog.imageUrl || "../assets/main_logo.jpeg";

    }else{
      alert(result.message || "Failed to load blog");
    }

  }catch(error){
    console.error(error);
    alert(error.message);
  }
}

async function updateBlog(){
  const token = localStorage.getItem("token");

  if(!token){
    alert("Please login as Admin.");
    window.location.href = "../frontend/login.html";
    return;
  }

  if(!blogId){
    alert("Blog ID missing.");
    return;
  }

  const blog = {
    title: document.getElementById("title").value.trim(),
    authorName: document.getElementById("authorName").value.trim(),
    imageUrl: document.getElementById("imageUrl").value.trim(),
    content: document.getElementById("content").value.trim()
  };

  try{
    const response = await fetch(`${API_BASE_URL}/api/blogs/update/${blogId}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify(blog)
    });

    const text = await response.text();
    console.log("STATUS:", response.status);
    console.log("RESPONSE:", text);

    if(!response.ok){
      alert(text || "Failed to update blog");
      return;
    }

    const result = text ? JSON.parse(text) : null;

    if(result && result.success){
      alert(result.message || "Blog updated successfully");
      window.location.href = "admin-blogs.html";
    }else{
      alert(result?.message || "Update failed");
    }

  }catch(error){
    console.error(error);
    alert(error.message);
  }
}
</script>

</body>
</html>
