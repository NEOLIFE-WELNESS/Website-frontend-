<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Blog - Neolife Wellness Center</title>

<link rel="icon" href="../assets/main_logo.jpeg">
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<section class="add-blog-page">

<div class="blog-form-box">

<h1>Edit Blog</h1>

<form>

<label>Blog Title</label>
<input type="text" value="Benefits of Panchakarma Therapy">

<label>Category</label>
<select>
<option selected>Ayurveda</option>
<option>Yoga</option>
<option>Panchakarma</option>
<option>Naturopathy</option>
<option>Lifestyle</option>
</select>

<label>Author Name</label>
<input type="text" value="Dr. N. G. Muraleedhara">

<label>Current Image</label>
<img src="../assets/ayurvedapancha.png" class="edit-blog-img">

<label>Change Image</label>
<input type="file">

<label>Short Description</label>
<textarea rows="4">Panchakarma is a traditional Ayurvedic detox therapy that supports body cleansing, rejuvenation and long-term wellness.</textarea>

<label>Full Blog Content</label>
<textarea rows="10">Panchakarma is one of the most important detoxification and rejuvenation therapies in Ayurveda. It helps cleanse the body, balance doshas and support natural healing.</textarea>

<button type="submit" class="save-btn">
Update Blog
</button>

<a href="admin-blogs.html" class="back-btn">
Back to Blog List
</a>

</form>

</div>

</section>

</body>
</html>
